front:
  text: 律宗燈譜緣起客曰師何以有是律宗燈譜之舉也余曰酬夙願耳客曰師之願為天下之公願乎抑一人之私願乎余曰公願也客曰夫所謂公願者果何謂耶余曰是願皆公不公何願佛法之分三宗固不至今日始也若自執一宗便為了事是非特所見之陋且未明慧命之源夫我佛出世立人天之極則明於心開禪學之源行於身表律學之範宣諸口啓教學之端三學備於一人慧命該乎萬世教雖有三所以行之者一也自佛滅度後從上諸祖心通其全躬行其一蓋以度人為急各行所願遂有宗教律之三門設使當時宣祖不遙依四分建立宗主開南山一脈則佛法之於震旦亦止傳授禪宗與經論而已戒雖隱寓其中其實未顯明於天下由南山以前推之未嘗無曇無德部戒本羯磨義疏疏科種種律儀無如時顯時晦未若禪宗之繩繩不絶也自南山以後稽之未嘗無滿意大亮等諸祖踵行戒法始終斷續相仍未若禪宗之分承傳授也維我古心馨祖挺生於戒法陵夷之候親受文殊大戒之源為優波離再來開戒古林靈谷棲霞甘露靈隱天寧等處宏戒二十二年南北道場三十餘會傳法門人有蓮相宗大會海等大律祖十餘人分化四方而律學為之一振何其偉烈歟然此十餘祖之後惟寶華三昧光祖德齊於師而興戒尤為蕃衍故本朝百餘年來天下之戒法受自千華者十居八九故千華主人文海聚公於乾隆初年輯南山宗統一書敘馨祖下分燈於他處者列其世系於前後自千華一世以至九世另為世譜閲者謂其詳於昧祖一支而略於列祖各派余謂聚公之輯是書也非有成見於中而故為詳略也抑詳乎所不得不詳略乎所不得不略耳方其輯是書時何嘗不廣徵博采求天下之出於馨公之下者咸登是集既以表律學派演之昌復以冀律學流傳之永甚盛舉焉乃有限於道里之修或阻於應徵者怠第就其見聞稽考之所及而成是書也凡在列祖之後何不可以比照千華之例各輯一支譜牒以𡹁後哉顧我愍忠大會海祖以後孤危一線宏宗固不乏人法道未能聿盛再傳而至振寰福祖於本朝康熙二十五年春自廣濟奉旨移錫潭柘宏開戒法為潭柘中興律學第一代七傳而至諒於辛酉繼席以來歷今二十四載春冬戒期黽勉擔荷甲子春恭逢今上皇帝大駕臨幸山中賜內帑以資僧衆御題額聯焜耀叢林又賜法物優隆佛地去年翠華重幸茲山天顏大霽歡喜倍前賜佛賜經又賜帑金三百供佛飯僧皇太后賜金銀供器若干事御題四額永鎮名山似此恩寵洵千載難逢之曠典顧諒福德淺薄何幸際此遭逢賴輔弼諸大德力行善事興建道場愈整愈新輝煌宏麗有加無已但念遞代相承以得人為首務至嚴至慎必待執至羯磨方豫繼席而他處得法者無與焉因是於本山得戒者固多而於本山得法者恆少凡戒子開法於他處者即以戒為法惟在行持篤實可為後學津梁而已諒有願欲將馨祖下十代律師薈萃而輯為一書用昭馨祖分燈之廣嗣此而燈燈相演則海內律宗莫不明其端委悉其支派矣原擬廣為搜輯苦於年老苟再因循則此願終廢爰命監院琮璋諸人督理其事而法嗣壽聖祥珠亦躬其勞瘁而此編得以粗就從此代代相承年年續入從上源流燦若日星似與宗統一書互相輝映此則用酬余之夙願也夫客聞而歡喜讚歎合十而為之頌曰是願大公永永流通毗尼振起不墜家風即録之以辨簡端云乾隆三十年歲次乙酉仲春朔旦京都潭柘山岫雲寺第七代主律沙門源諒書律宗燈譜凡例宗家撰述斷自七佛茲譜以世尊為元始非謂簡捷蓋纂言提要之意也西天六祖自優波離尊者起者緣尊者為世尊近執世尊在世時即秉持戒律如迦葉諸祖雖三學互融莫不宏宣戒律故次之東土二十一祖專持戒律而振興此土實自南山宣祖而宣乃遙依曇無德為宗斷續相承逮馨祖乃大演毗尼宏傳宇內馨祖以下受其戒法者十餘人傳授戒法惟寶華光祖為最盛若鄧尉藏祖兼承臨濟禪宗其間多有絶其法嗣者後之人苟能遙相繼續亦不致支派滅如也馨祖下第二世以至十世俱依世代同列其開戒道場與其實行傳紀悉注明於下譜中所載傳紀惟就已見者登梓其有祕藏或已刻於家者望不吝郵寄以便補入用昭軌範諸律師撰述書目或已行世者或未行世者望詳明寄示注入以表人文諸律師塔銘乃揭一生之實録作者不論王公韋布悉皆載入若投贈之詩文容俟搜羅別集遠省名山詎無行持戒律以度人者要皆出於馨祖之下或自執己見孤詣自行或限於疆里莫能遠達幸海內同宗留心詢訪敘明戒源俾登斯譜免致久而湮沒譜中大會海祖三昧光祖澄芳清祖隱微理祖共四大支各依世次列入非漫分前後也其餘列祖法嗣無考者遂闕之南山宗統所列諸律師法嗣其分敘先後有誤者今依次第槩為改正譜中所載舊傳有詞句過於浮泛文義未免疵謬者略為增損以就平妥其有見不到處望諸山更有以教我此譜收輯刊行皆本山自備鉢資無俟諸山佽助若刷印流通者止給紙工可耳此後續入儘可依次登梓不得混淆誤列同宗派系名字暨所住處望開明速寄山中隨到隨梓不敢怠忽潭柘實道人謹識
