善任不虛所舉師還舊山歲癸酉届師甲子初周四方稱祝事畢躬督兩序僧百餘下山詣省城門南聚寶山下大報恩寺禮康僧會祖昔吳大帝赤烏四年願興佛法帝命求釋迦文佛涅槃火化後收取所有出現舍利至明永樂初文祖建報恩寺舍利昭感祖隨命建五色九級琉璃寶塔重供奉之幽顯崇隆何壯麗也師至凡七晝夜塔內供養幢幡氈褥香花燈燭餘食蔬果皆師自傾鉢資偹設師復統諸律衆圍繞唱誦經行贊頌禮念七日內現種種光相有時如車如輪有時如幢如蓋有時如雲如霞有時如樓臺殿閣有時如日月星斗千變萬化不一而足省城內外宰官縉紳長者善士聞而感動乘車跨馬填街塞巷肩摩踵接輻輳絡繹而至瞻仰聽聞禮拜隨喜貴賤賢愚不分日夜稱奇歎異因相生敬發悟者不可數計皆由一誠以啓迪之也尚有欲求一覩師容一禮師足一聆師謦咳而不得嗟惜而去者即此益知師因緣福果當何如耶於宣化之餘采諸律部內精華發前賢底蘊著毗尼關要十六卷羯磨會釋十四卷比丘尼律本會義十二卷以便後學知所適從至若莊嚴銅殿興造齊堂增置山田擴大常住修殘舉廢正紀維綱二十一載為法為人四威儀中無非律範歲庚辰季冬朔示微疾隨命大衆集方丈自取紫衣戒本授闍黎松隱義主席囑之曰合山內外凡我等出家之人不過為生死兩字既為生死不得不真實修行既知修行必當嚴持戒律若不持戒而欲超脫生死者如緣木求魚捨舟渡海安能有所得而登彼岸耶此座道場初自昧祖開戒創立規模收攝龍象遂得先老人繼振綱紀三十餘年苦心而成山中儀範無一不備天下稱為波離再現律法中興至先老人示寂諸同門皆余之師範如成和尚者又係先老人同鄉同學而為弟子者俱置之不問豈獨屬意於我我勉力撐持二十一載兢兢業業恐負委託之重汝等現在山者久暫雖有不同執事無論大小而今而後總要嚴行戒律勤修誦持竭力輔弼新方丈三年以祖庭為重相和相勸合德齊心如同舟共濟如左右手相救遵前人規模作後人榜樣新方丈繼位之後當公心為衆厚道待人念三世創守艱難克成大業良非易易後事一遵先老人舊規况天隆本和尚在此諸凡請教而後從事餘不多囑吾早晚行矣視疾者悉令辭謝不得攪亂惟一心念佛至初八日沐浴更衣端坐而化於十五日奉全身塔於龍山之陽報體長短相稱惟頂骨高聳上不生髮光芒射人目鬚𩬆鬈然逈異儕輩實乘宿願而來興此山者世壽六十有七僧臘四十有八坐夏四十有四嗣法弟子三十八人皆先老人之遺材一時同稱門下之錚錚者云雲居成拙律師諱性德滇之潯甸人也劉姓襁褓失母未幾父亦相繼而逝事繼母如事所生鄉黨以孝稱焉賦性果敢偶經古廟見一病人受極苦須臾命終因慨處世無常頓起離塵之志便飄然捨去禮嵩明州觀音寺見宗禪宿為師求度宗以有妻子纍却之師即歸安置既妥遂與剃落時年二十有二也久之辭往雞足參白雲大力諸老宿皆深器之遠慕寶臺立禪耆宿之風欲一往見道經浪穹值建龍華大會時見月和尚為黃冠於此飯僧師來掛搭邂逅之間宛如故舊師見其氣宇不羣終非羽客之流他日必為法門重器乃勸以為僧即訂云余若為僧願與公為友可乎師允諾會期滿散去師造寶臺越明年之十月歸省受業路過雲龍聞寶洪亮如法師應講於東山之大覺寺師往謁之方入門見公正於是日剃染相見喜甚以為如踐宿約而至也自此便不相離凡法師演法諸名山巨剎師與見公輔弼其間研窮教觀一日聞法師開示為僧必須受戒之語便同見公求受具戒法師云余講經不傳戒今江南三昧律師可往求之於是束裝並下江南烟水百城迢遙萬里捍勞忍苦師無不以身先之崇禎七年冬抵金陵昧祖已說戒五臺明春直上臺山甫到而昧祖又受京師之請矣次年秋旋往京都至寶定遇兵衝散師獨轉江南於諸叢席遍覓見公了無音耗隨往浙中參諸名宿最後依密祖於天童久之因懷見公復腰包尋訪莫知所在遊至徽州黃山見山水竒絶遂縛茅居焉至崇禎十二年聞昧祖主席華山師具衣鉢往求大戒不期見公已在祖座下任監院事一見師來悲歡交集是冬方獲戒品時年三十有三也既得戒便依祖學律至乙酉又六月祖將辭世取紫衣戒本授月師繼席華山師輔弼揚化𡹁二十載復思返黃山舊隱一日獨擕杖笠飄然而往遇繁昌合邑緇素久嚮師德固留駐錫於本邑雲居寺歲癸卯諸檀越請傳戒於南寧之千佛院次遷鳳陽之大洪石梁竹林諸剎後就竹林寺閲大藏經次年丁未蟲蝗大作寺之縱橫數十里寸草無損遠近咸以師閲藏典之所致也檢藏畢修大悲懺法四七晝夜肇啓之晨合郡宰官紳襟詣寺拈香忽來海寉千餘旋空鳴舞逾時方散諸文人咸賦詩以志異終期退居石梁復重翻大藏自慶難遭見公纍招師還山師辭以疾庚戌春乃見師古稀之辰入山拜祝勉留在山任羯磨事甲寅春香岩李公請重興天隆古寺見公命師董理閲六月而告成乙卯初夏師亦躋七旬矣見公集衆送師入丈室師以年老辭衆檀懇請至再遂住持天隆每歲春冬傳戒會食不減二千餘指歲辛酉孟夏朔旦師偶過戒香庵與主人聚談抵暮方歸次晨忽索湯沐浴更衣辭衆端坐而逝師世壽七十有六僧臘五十有五戒臘四十有四得法弟子學彰超淵等奉全身塔於華山左側宿遷極樂庵湛一律師諱性澄族姓胡氏山東裳邑人也幼業儒未就年十九禮本邑普照寺了塵師落髮遂立志南遊參學至淮安受具戒於嵩乳和尚次從正觀法主習賢首教住袁浦慈雲庵內持淡齊數年刺血書華嚴報恩二經全卷嗣參報恩玉林和尚及諸大名宿最後登千華覲見月和尚精學戒律三年止作二持一一熟練甲午受宿遷智恆師及諸檀護請至極樂庵主持院事丙申冬師上千華敦請見月和尚至庵傳戒期畢即送師入方丈授以度人法是後歷年傳戒佛事森羅遠僧雲集道俗景附檀施日廣鳩庀修建賓至如歸渡淮以北千里之內極樂庵遂巍然為一大叢林師之力居多焉辛丑歲淮陰請師傳戒師至重興圓明古剎繼受邳徐及兩淮諸名剎請董修大悲懺法每感異香不一而足還山後雖年衰猶精進不輟行般舟三昧不坐不臥行滿三月又念四方行腳去極樂北無息肩處於離治六十里㟃峿山之五花頂創建全潮庵山下道旁建茶庵接衆𡹁示後人亦為傳賢常住康熙甲子得腹疾至十一月初一日呼湯沐浴更衣命侍者集衆曰吾今日當與衆別我傳法大衣授之教授桂呂嗣主院事傳授三聚大衆愕然師曰吾忝律師傳戒利生二十八載當報佛祖深恩和尚厚德吾願未終誓當再來誡衆念佛跏趺端坐而逝前後傳戒凡三十餘壇感應竒異恐涉驚聞不復筆之住世六十九歲坐三十二夏塔全身於全潮庵之塔院所著大悲淨土懺法𦦨口作觀節次儀文行於世焉古杭昭慶宜潔律師諱書玉族姓唐氏武進人也母夢月光入懷而生幼喜稱佛號稍長即茹素從師習舉業通曉儒書一日𦗟鄰寺僧誦大乘行願品經質問義趣言下豁然遂辭親詣京江嘉山依自謙和尚剃度服勤既久赴金陵華山受具於見月老和尚晝則供侍巾瓶夜則究研律部與定庵律師並為嗣法高弟子康熙癸亥冬定公偕師赴昭慶說戒甲子春定公還山師遂駐錫茲剎按志武林之有昭慶自唐道宣師始也寺之有戒壇自宋允堪師始也厥後屢遭兵燹勝跡猶傳明季三昧老人自華山來登壇提唱四衆景從既而嗣音寂然壇久塵封至師而法輪重振非偶然矣師躬行實踐操履慤誠寒必露頂食不過午與衆同甘苦均勞逸每歲春冬戒期四方緇白聞風翕集前後得戒者約萬餘人庚辰寺燼於火於是宰官捐俸居士助資勸師次第建造辛巳冬大悲閣工竣值說戒時雪堆閣脊象形如鼎衆推師願力所致師曰此燃燈佛降生之地應有顯瑞我何力之有自壬辰訖己亥八年中不遣一僧募緣而一切門垣殿宇像設器用以及普同塔院山寮園房靡不經營結構輪奐聿新成功之日朝廷頒龍藏供奉莊嚴千楣萬栱照耀湖山可不謂祗林希有之勝果歟師生於順治乙酉七月二十四日康熙辛丑十一月十四日示微疾說偈端坐而逝世壽七十有七僧臘五十有六三坐道場傳戒八十餘期所著梵網初津羯磨儀式沙彌述義香乳記二部僧授戒蘭盆合釋懺悔文解發願文解賓主序解等行世門人奉全身塔於本寺有南屏樹公傳贊曰夫所謂傳者傳其人之足以𡹁教天下後世而不泯者也故夫子首重明德新民底於至善自曾子傳述已降而濂洛諸公操而循之聖學賴茲不息至於生死之際有過人者吾釋氏亦然故如來觀機設教雖分大小皆以戒定慧三學為階梯舍利弗目犍連之徒智慧神通各擅其科逮傳震旦三宗法匠亦從三學入道而慧由定發定從戒始良以欲波不興識浪澄渟雖無息靜之念而心自定視生死去來若渡河筏之與寓舍到岸曉行初無顧戀苟非實踐三學以資十善鳥能臻是然而難矣我昭慶宜潔和尚能之師於辛丑十一月初六日示微疾每愈十二日命戒弟子心印卜善逝日印以十四日未時對至期果從容沐浴更衣鐘聲集衆念佛協助往生說偈曰昔從恁麼來今從恁麼去驀豎拳顧左右云會麼大衆側耳𦗟此是末後句遂揮諸弟子令出居士來前於是將軍都統固山諸大人緇素環繞送師者千有餘人既而斂容端坐良久探師鼻息而師已逝一衆莫不香花瞻禮悲喜交集於康熙壬寅十一月二十一日嗣法門弟奉全身於本山越九載矣己酉春繼席高弟澄如律師以師行狀塔銘示余屬一言為傳余曰噫隆樹遁跡南屏磊落自放豫言何足為令師軒輊律師以余交久契深洞知生平最悉假手他人何以傳先師之實行耶固辭弗獲獨托和尚最後一著為之表揚萬一耳和尚主席昭慶三十八載惟以土木中興為急務注述教戒為己任數十年來殫精勵志宵旰忘疲眼光落地人固疑其手足𢗅亂勢所必然而卒能灑然𡹁手得大自在雖多年親炙弟子亦莫能測師若是則三學之功於茲驗矣使天下後世知善知識非徒事唇吻而貴篤行故聖門謂參之魯處羣弟子中若無竒者終能傳道易簀正命由是觀之道固在乎躬行而不在乎駭誕而和尚於塵攘歷落中超脫生死如遊子歸鄉刻期至家又何足怪哉嗚呼南宗未來北宗已往而師傑起浙東亦賢矣哉至於功業休徵嘉言懿行門弟已記其詳而王公塔銘復敘其槩茲不贅録乃為贊曰儒之所貴明德中庸釋之所重三學為宗世遠人遙誰能執中乃有人焉玉器雪融萬行圓修三學兼宏最後光明高逾元穹𡹁教萬古罔知其終仰師道跡浩渺難窮猗歟偉哉碧水蒼松令我慨懷抽毫無從昊天不弔頽厥天峯敢將蕪詞深愧厥躬炳靈匪邁鑒茲感通蘇州獅林寺律師諱書秀號慧宗江南直𨽾通州人也幼悟幻泡即厭樊籠因仰空門便依精舍習止教觀易若溫尋是時金陵寶華山見月體律師再來古佛四分宗師迷途皆俟其指南前路咸推其向導師往摳衣遂收門下知是法器因授記焉承師囑命往蘇州鳳凰山獅林寺登無畏座講木叉律容止端嚴詞辨清暢瞻仰者皆悉由衷信受者得未曾有是以檀越大司寇翁公鐵庵等俱皈依受戒請講楞嚴經敷衍微言闡揚祕賾七處徵心一時指掌特出新辭而曉衆每拈妙旨以示人曲暢旁通明白直截一掃支離之習不同汗漫之談使𦗟聞者恍然如披雲見天信受者曉然如撥霧覩日因生難遭想者若而人因生尊重想者若而人是故見祖題額曰徵心律院蓋紀實云繼命住楓江慈泰寺西園戒幢律院崑山放生玉泉等處所至之處偶有不合輒棄之去曰老僧腳板從來濶未必骷髏向此埋緇素固留亦不屑就又曰古德有云楖𣗖橫擔不顧人直入千峯萬峯去此何如人哉吾意已决矣師生於崇禎癸未十二年八月初三日示寂於康熙己卯三十八年九月初三日世壽五十有六僧臘三十有五建塔於獅林之右穹山下靈躍律師淳朴律師皆出其門謂之梧桐多棲鳳鳥謂之芳沚頗秀蘭叢門人孔多二師為最誠出世之津梁亦律門之領袖也贊曰嘗讀宋僧贊寧所撰高僧傳其科有十義解居第二明律居第四所謂義解者即吾儒之講學是也聖人以學之不講為憂蓋學必講而後明也先知覺後知先覺覺後覺者端在於是所謂明律者即吾儒之克己是也非禮勿視非禮勿𦗟非禮勿言非禮勿動此即戒也律也顏子請事斯語直下承當夫子美之曰顏氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行是不二過一戒永不再犯明甚合而言之義解者知也明律者行也若慧公者講明經義是義解中高僧也戒律精持是明律中高僧也可謂知行合一者矣是以靈躍律師出於其門使律宗大盛有以夫有以夫蘇州真諦寺碧天律師諱書淨江陰陸氏子生有異質孩抱能誦佛號逢僧輒拜十三喪父矢願出家禮藥雨老宿為師沉靜好學稍長走華山從見月和尚受戒見公器之俾為侍者服勤有年歷遷要職精通律藏兼研經論造詣日深見公知其可重任付以信衣蓋律門之衰久矣明萬歷間古心師崛起金陵大宏法戒直接南山一宗三昧師繼之道譽彌隆駐錫江干之寶華山海內稱千華和尚見公繼席迄於師四世矣吳門程勉卿病𡹁死夢華山僧飲之藥而愈偕其友陸德敷輩入華山遇師儼然夢中僧也請於見公求師分化吳下見公以師年少遣首座葉庵應之居城西之積善庵尋去復更大圓律師皆略有所建立而法緣尚淺會師分衛來吳吳人乃堅請主席始至時敗壁頽垣韲粥不繼師處之恬如也惟精持律儀嚴攝一衆羯磨布薩規條肅然人漸信向檀護寖廣陸德敷輩為之勸募經營創造戒壇殿閣廊廡以次修建不數年遂成巨剎他叢林開戒多為短期簡略行事惟積善一遵佛制必慎必嚴規條斬斬稟戒常數千指肅然無譁衲子行道上威儀可觀不問知為積善戒子也僧之精心求戒者不之華山之積善以見月和尚在吳也吳中有真律師自師始師廣顙深目大頤方口長不過五尺目光炯炯吐音如鐘望之有威而性實和易遇人以誠接物以慈親踈一體敏鈍同誨學人一涉其庭依依不忍去長者喜施宰官樂護莫知其然而然也康熙三十五年皇上頒賜玉書金經建閣藏焉四十二年大駕南巡靣奉褒獎復賜心經等三冊御書衍真諦三字賜之因以為寺額道風彌震而師處之退然其自律甚嚴暑必搭衣寒必露頂食必持鉢䞋施填積一錢不私濟困扶危常如弗及其於戒法非苟說之實堅持之其於律藏既心通之又身體之故能不言而化𡹁範人天也乙酉秋九月示疾書偈別衆端坐而逝世壽六十僧臘四十有二嗣法弟子湛中等奉塔供養淮安聞思寺獨愚律師諱真賢泗州籍寶華見老人之高足弟子也性簡約尚敦實內外典籍無不博覽尤精於教觀深得楞嚴之旨自其稟具千華受囑見祖凡祖所傳集貫練精通故其分座演法稱為律匠云有行僧藍盂建齊僧館於楚州之古枚里謀請師於漕憲大中丞帥公公欣然改齊僧館為大悲院仍施膳僧田地豁免一切差役迎師住持師遂演教乘於楚域樹戒幢於淮干而其傳戒儀範悉遵寶華成訓不少改踰見者咸謂大淮南北而有南山律學者自師始也然院之初創數楹而已况兼饑饉之餘艱窘莫支師殫力募修精誠感發營建廊廡齊厨堂宇靡不完備嘗與盂公論諸方叢林每至圮廢者皆分房之也遂立誓勒石永遠傳賢不招徒衆又念止作二持乃末法之津梁律學之指南必入大藏庶不負著述苦心並晰鏡磚疑議因憤志往京師遂留都作待時之舉而座下雲集緇白迎主白塔寺之淨土殿師復率衆宏揚戒法兼修淨業其營建創修亦如住大悲之日因積勞成病僧衆欲延醫治師止之曰幻化空體聚散不常何勞人事終不服藥臨終猶誡學者遵守戒法棲心淨土既而曰吾志未遂天將限於後時乎語畢而逝法嗣遍知正等奉師靈塔𡹁範人天云黃山翠微寺心空律師諱海學順天大興縣人初至楚之荊州適同縣王親王天瑞相值疏於惠府遂為剃度僧旋走白衣庵乞一齊和尚為受其戒後侍和尚入黃山補慈光監院職越三載退居翠微寺焦陳二姓諸檀越以殿宇頽圮僉議重建非師莫能當其任即具啓䖍請師亦不辭艱苦廣告檀度不數年百廢俱舉從事習律諸弟子請師登壇教受者久之師力辭不允奈依歸益衆遂以順治庚子冬諾衆檀越請大開律壇傳授衣鉢仙源之毗尼整肅此際為盛師平日處衆無怒容對賓無長語惟日持穢跡金剛神咒不輟先年嘗閉關於惠府凡受供衣臥具見有淡苦隨手轉贈寧自忍寒凍惠府愈奉給無厭而師之施念更無有已也其生平慈厚如邵朴元記云敦本實也彰永久也金陵古林庵長安增律師不知何許人氏於順治戊子年之春古林因蜀僧西瞿輩竄入而淵源泉公遂之東海瞿後退去是冬請師歸鎮祖庭闡戒談經星霜四易嘗諭衆言世事沒了期恰好便休去莫待臨渴掘井措手不及矣於壬辰春二月初四日犍椎大集當堂以方丈交付藏林華秋八月初十日順化古祖下五世京都廣濟寺萬鍾祿律師法嗣振寰福律師潭柘中興一代有傳京都廣濟寺道光會律師法嗣止安越律師潭柘二代有傳德彰林律師潭柘三代有傳中州龍潭寺荊璞璽律師法嗣道主海律師徐州廣濟彌主起律師金陵寶華山定庵基律師法嗣松隱義律師寶華有傳玉文碩律師般若有傳眼聞明律師慈應有傳妙御乘律師亳州妙湛善律師天月瑞律師菩提雪衍怡律師京都極樂悟聞定律師語