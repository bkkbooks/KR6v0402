遂入雷音之佛座空山蘭若戒行深嚴古洞蒲團勤修勇猛負手萬峯之曲盡日忘飢燃燈一室之龕終宵入定二十年密行驚人千萬劫因果不苟舉步而師門器重知志願之慤誠低眉而性海圓通識道心之堅固千華縹經壇共振宗風雙樹婆娑法席還為都講餘霞句曲藤蘿之舊路依然凉月瞿曇檜柏之前遊無恙冷暖一泓流水清閒只愛住山高低幾片孤雲性懶何心出岫既而本師文海老和尚袈裟內召趨朝瞻有喜天顏鈴鐸高壇說戒聚無遮大會於時天月律師情殷輔弼首作龍衛虎從位列傳宣同灑香風花雨海內之緇黃雲集毗盧羣仰莊嚴日邊之金碧烟凝頂禮同生悲悟道場圓滿瑞鶴摩空梵唄悠揚金猊現相禪燈月朗諸天盡化光明戒鼓雷鳴大地都為震動乃承恩入覲𡹁青正眷齊筵而拜疏求歸賜紫遙還舊壑潞河餞後秪懸清夢於歸舟鍾阜吟同尚帶御香於老衲望雲山於北地十三陵別夢蒼茫尋烟雨於南朝五百寺詩懷清曠然而琳宮福地可無住錫之高僧紺殿祥雲遂擇傳衣之法嗣於是天月律師就日瞻雲遵王言而登寶座結衣敝屣率大衆而守清規闢鐘魚於靜室地偏自遠塵囂供瓶鉢於幽軒客久頻經歲月觚稜突兀雲開遠響霜鯨簷角琅璫風動齊鳴鐵馬雖郵書招隱懷鄉欲返東林而優詔堅留祝國宜從西苑愛一拳之繩瘦石骨同癯憐四面之紛𡹁槐陰已老慈航廣渡婆心之接引何窮冷竈分餐苦行之薰修益固猶且念師恩之未報馨香願肅丹青傳帝澤於無疆誦美誰書碑碣遙尋廢寺徘徊破瓦頽垣偶訪偏隅惆悵荒煙冷露遂布金而購地藏將舍利瑤函爰掃石以成壇建出波羅寶閣宜其證真如於般若金剛留不壞之身宣律教於迦羅玉帶鎮多情之客也哉余也憶對床之風雪曾眠薜荔歌介爵於雲霞屢餽葡萄仙露乃頻遊京洛青眼猶存而話舊山河白頭相慰菩薩之飛行何處每因離合關心維摩之棒喝多年已悟升沉若夢食去桄榔麵味齒牙盡帶旃檀吟歸芍藥花欄肺腑初嘗蔬茗偶然一笑清談已過虎溪且約三生後會重逢圓澤云爾敕賜維揚傳千華八世智珠寺開山第一代德增賢律師傳略師名性賢號德增淮郡之安東嵇氏子也嵇故中散後裔世為甲族父祥生處士有隱德母孫氏夢慶雲入懷而孕産時異香滿室時康熙癸未正月二十二日亥刻也生三日不乳稍長不茹葷具夙慧好禮佛己有出塵之志父母異之不拂其意十一歲遂出家於郡之廟灣祇園寺為子敏師弟子寺故以法事狥世俗之請吹螺唱唄日紛如也師廁其中鬱鬱不得志慨然曰吾聞如來大法將以明心見性顧爾作劇耶吾其行矣二十一歲遂决計詣寶華山受具足戒於文海大和尚文公一見師即器之令侍巾瓶依左右師服勤執事惟謹凡朝夕之所咨叩出入之所見聞薰心砭骨如奉龜鑑數年復遍參知識造虎邱謁洞明和尚繼謁諸大尊宿師慧悟超凡勇往精詣洞徹宗旨豁如也雍正十二年恭遇世宗憲皇帝特召本師文海和尚入都皇壇傳戒師從襄事賜絳衣臨壇作證戒期圓滿於圓明園引見奉命內庭參禪恩賚優渥師勤慎小心寒暑不懈今皇帝御極奉敕還山復佐理華山事師已甘心遁世無何維揚有吉祥院者地臨河濱寉雜囂塵為諸無賴逼處漸就圮廢郡有檀護汪交如戴南翁等敦請師住錫師堅辭不允繼以三請諄諄遂慨然擔荷敗壁頺垣虀粥不繼晏如也鳴之縣尹趙公將無賴懲治門庭以清詳碑記中師精持律儀嚴攝一衆羯磨布薩規條肅然人漸嚮信檀護寖廣今藩憲何公等為之勸募經營殿閣寮廡以次修建基址式廓不數年遂成巨剎乾隆十六年辛未聖駕巡幸南服師率衆迎鑾蒙賜智珠寺額天章璀璨炳曜日星復奉鹺使今少司農高公發帑重修梵宇巍峩益增巨麗於是創造戒壇並搆精藍五處續置齊田四百餘𤱔資接雲衆稟戒食指數千寂然無譁隱然華山一大支派也師言貌伉朗風骨森峻見者望而敬之而居心和易遇人以誠接人以慈親疏一體敏鈍同誨學人一涉其庭依依不忍去道風彌震而處之退然其自律甚嚴寒必露頂暑必搭衣食必持鉢襯施填積一錢不私每巨工大役一身肩之不動聲色而衆力所趨不言而信不約而嚴故其所成就規橅宏整若此南豐曾氏有云佛之徒凡有所興作其用力也勤刻意也專不苟速成不求急效故善以小致大以難致易豈不信哉師之嗣法弟子圓亮化等多人余與師同里戚𧨏又方外交多年故為之標其梗槩以勒諸石且俾後之嗣居茲寺者遵循不替刻苦修持以為可大可久之規則智珠律院之興與華山並峙永永無極矣時乾隆三十有二年三月震旦賜進士出身原任日講起居注官翰林院編修山陽阮學濬拜撰廣陵高旻寺昭月律師諱性貞姓余氏彭城沛縣微山人也幼多病依銅山曹都寺潔生師出家疾遂愈嘗誦法華經於止止不須說我法妙難思處偶句斷不續良久始知最上真乘必假參悟非思量分別之所能解年二十投蕭邑皇藏峪宏濟律師求戒秉具後即依止學律歷三寒暑一日隨衆聽宏公講金剛經首頌有本來無名字權立號金剛之句師當下有省庚午秋立志南詢宏領見大樗老人樗命宏公記莂師敬辭云既秉戒法當以戒住何必更要頭上安頭他日若把茆蓋頭敬拈瓣香供養樗頷之遂辭去參維揚萸灣野樗聖老人聖一見大器之日此真參禪客來也於是安居三冬始得發明個事乙亥春因剃度師病回里於皇藏峪度夏樗謂師曰汝得戒和尚傳戒至汝不復再傳汝當憶戒源不可遠去吾老矣師默然是歲秋萸灣聖老人遣人促師回南丙子夏聖公示寂命師繼席終年領衆坐禪專以生死二字警䇿學者又時念瑞雲二老人之婆心言猶在耳乃於庚辰歲恭逢皇上萬壽於本寺敬開戒壇宣持毗尼用報君師之恩復於次年春受雲陽邑主請住聖壽寺傳授三壇大戒凡此皆為瑞雲二老人之付託也歲甲申過彭城掃樗老人塔拈香曰靣目分明遍界親偏於此地沐恩深而今更覔吾翁意雲滿岩阿花滿岑此可以想師之風範矣宿遷極樂庵坤傳律師諱性微姓周氏本籍山陰其高祖維墉公任徐州協鎮府遂家焉父諱廷祥母尹氏以師齠齔時多疾許為僧銅邑平山寺頻吉和尚師之舅也年十一即依吉公脫白誦經習禮足不踰閫者十載乾隆己巳秉具於極樂印可律師研究五篇七聚諸大律部併檢閲龍藏四易寒暑癸酉歲由引禮任維那事印公見其賦性木訥不尚文飾將來必為法門大器乃集衆以衣鉢付之師念擔荷匪輕益加黽勉乙亥春歸里遂之蕭縣參皇藏峪大樗老人講四分戒本自證曩時所解至此愈為開豁由是回極樂為堂主為典客為後堂歷任諸職不辭勤勞癸未歲印公疾命師繼席時有玉真師自京南下師以讓賢避之印公不能強乃進師教授以為玉公輔佐凡歷三年闡宣律範左右護持師之力為居多乙酉春師北遊都中得與萬壽龍華勝會聽量周和尚講金剛注解復謁嘉興達天法師講法華指掌當是時法源柏林拈花瑞應臥佛香界諸大名剎皆道冠南北師一時參訪殆遍又仰潭柘恆老人道範不憚崎嶇攀林越澗直入雲峰但覺滿山爽氣颯然以雙袖擕來不徒瞻其門庭高峻規模宏整已也是歲秋歸極樂玉公致還法座堅欲回都師猶再四遜謝兩序大衆復以印公遺命是責乃允其請師繼席後凡殿宇廊廡殘者葺之廢者創之不數年法雷益震戒幢益高與壽聖古寺兩剎相望真柵淵之勝境並峙於黃流赤石間者其後此宏大戒律不有可預期者哉睡庵劉霞彩撰古祖下十世金陵寶華山理筠言律師法嗣渾儀先律師寶華自性安律師慧如覺律師東魯登律師見可微律師含虛境律師極樂寺慧善曜律師法嗣轉周輪律師菩提隱空援律師怡然悅律師仙寓海印源律師無上極樂寺澤周福律師法嗣怡章泰律師逸山慧律師慧遠元律師廣露塵律師京都法源寺天月實律師法嗣遇隆升律師法源智海理律師德圓因律師聖德成律師智達通律師永清燦律師圓明日律師敬天法律師杲堂融律師愚慧柱律師震璽珍律師福山超律師濟蓮瀚律師慧月明律師輝玉徹律師悟修柱律師宏修普律師灞州千佛松巖修律師京都廣清寺清虛林律師法源潔清廉律師仁壽元亮炎律師貫之文律師房山觀音得空恆律師正因佑律師京都祇園廣度欣律師衍慶朗然徹律師宛平觀音一峯元律師華藏慧清經律師福安泰律師月溪靜律師金陵文昌乾象興律師甘露德林秀律師涿州普慶振基緒律師房山康寧杲中本律師房山觀音萬和春律師五台祕魔巖覺一智律師柏峯壽律師箇中意律師一周體律師東安龍泉天玉瑛律師京都福德雙修慧律師京都觀音在如環律師京都斗姥閣見真修律師智寬法律師悟源真律師福洪德律師慧實貴律師和光來律師慧明穩律師聞見悟律師毗陵法雲寺淡園素律師法嗣洪量然律師覺融如律師瑛燦英律師西曉一律師德源溪律師西誠性律師任城玉露庵誠朴慈律師法嗣清濤松律師鐵峯山律師求智慧律師慧然智律師曉真進律師大潤然律師天成證律師揚州智珠寺德增賢律師法嗣超聖化律師智珠曉蒼亮律師龍華再先基律師鵠峯泰律師廠山源律師靜安愷律師金陵天隆寺如登從律師法嗣琇文本律師善倫英律師法嗣如愚塵律師泰州福慧庵嵩山善律師法嗣昱旻有律師萬壽秣陵天隆寺德滋泰律師法嗣映霞燦律師洪遠悅律師天然律師金陵觀音寺瑞符泰律師法嗣無量海律師蕪湖荊山泰州光孝寺炳一慧律師法嗣西林能律師自覺悟律師巨德照律師天中永律師揚州開元寺震蒼靜律師法嗣朗月堅律師宜陵慈雲寺復聞廣律師法嗣卻塵崙律師亮賓耀律師靜遠智律師鏡堂鑑律師維揚觀音寺息凡慧律師法嗣悟一明律師執中芳律師真修悟律師上方寺西爽照律師法嗣曉凡遷律師揚州敬佛庵參一學律師法嗣澄如緒律師敬佛蘇州圓通寺慈雲世律師法嗣靜凡智律師靜融慧律師地藏庵一化乾律師法嗣元鑑傳律師宿遷極樂庵坤傳微律師法嗣中和寬律師樂然來律師宿遷全潮庵天滋潤律師法嗣參峯禪律師全潮瞻佛慧輪修律師法嗣德文愚律師淮陰觀音寺涵空長律師法嗣蘊洪海律師貫哲賢律師繼善興律師耀瞿法律師淮陰吉祥院侶賢濬律師法嗣天然慧律師吉祥碧溪湛律師吉祥淮安三界碧淳環律師法嗣凌雲先律師藏波允律師惠寬緣律師阜寧鎮海院德馨蘭律師法嗣文質彬律師豁微敞律師古祖下十一世京都祗園寺正因佑律師法嗣文慧智律師宛平觀音寺朗然徹律師法嗣永安有律師瑞安仙律師金陵文昌庵月溪靜律師法嗣默堯澤律師涿州普慶寺德林秀律師法嗣聖峯仁律師淮陰吉祥院天然慧律師法嗣明遠照律師淮陰吉祥院碧溪湛律師法嗣慈濟珠律師聯輝燈律師滌塵睿律師京都愍忠寺諸律師其法嗣出自某某今多不可考姑依其先後繼席分為世次以補於譜末俟核實再以其法嗣逐代敘入大會海律師一代太空滿律師二代秀岩律師三代無還律師四代普潤修律師五代釋𠎝璽律師六代仰月潮律師七代心宗存律師八代雪林宇律師九代洪修學律師十代行實德律師十一代法藏禮律師十二代慧寬性律師十三代又為廣慧寺第一代
