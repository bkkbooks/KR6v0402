年十四依吾邑護國庵靈峰和尚剃落習經論者十載乾隆癸酉師年二十四偕同邑廣睿師赴潭柘求戒時恆實老人主岫雲席圓具後即依止學律研究二持甲戌夏受引禮職師與廣公各司一堂歷二載至丙子春聞嘉興達天法師演說法華指掌師下山聽講畢又於拈花參恢慈禪師既結冬猶未决疑會岫雲監院琮公力挽回山任以舊職昔岫雲祖規以戒為法而恆公見師氣度冲淡脫出塵表乃於戊寅首夏浴佛誕日特為記莂以分其化是歲秋壽聖靈老人年逾七旬倦于院事遣人促師來宿師不獲辭一瓶一鉢飄然南下時有鹺憲高公相送入院以正法席當是時荊𣏌滿砌瓦礫盈階舉目荒凉幾難復振而師怡然處之歷三夏歲次辛巳募廣陵閔居士衣鉢五十三單而高公又助銀三百以勷其事於是道場之盛遂甲于淮北期既畢同潭柘琮公詣南海禮普陀大士道過江浙諸大名山供佛齊僧隨在結緣最後至阿育王寺覩塔中舍利以證明道果及歸於揚之慧因寺度夏念從前參拈花舊疑時向布金洞公請益此事甲申冬再至廣陵晤高旻昭月和尚值昭公欲北上偕以同行舟至五臺阻風登岸散步憩於上方寺竹西亭下有池水空明可愛昭公偶折竹枝蘸水謂師曰識此否語未畢其枝上飛泉無意間灑及師靣師當下有省遂留偈別去乙酉夏恆老人訃至師又偕廣公北上恆老人入龕後廣公留山師辭歸己丑春大殿圮師入城托鉢廣募萬人大緣三年厥工既竣並建殿後之左右二樓以廣其制師現在所歷事實如此師曹姓父諱必達母石氏滁州籍即歐陽公所謂環滁皆山者噫師其得滁山之秀者歟庵劉霞彩撰寶華珍輝律師諱實𤤯鳳陽府霍邱縣陳氏子父玉林母汪氏師幼有奇相聞僧誦經宛如宿習孰師授學過目如流師甚愛之嘗謂其父母曰此子年雖幼稚觀其行止非凡品也他日必亢君家宗苐恐紅塵中未能拘繫耳越三年其師又代為之請父母知其志不可奪遂送師於本邑大悲庵心開和尚祝髮誦習華嚴涅槃諸法寶悉通大義年二十五慕華山戒壇儀範嚴肅律法精細欲詣山求授具足大戒於是辭師南行旬有五日而渡大江抵龍潭下院次早上山一徑俯仰周顧有如舊遊熟境不覺驚歎曰小子不過一博地凡夫耳以何因緣頓臨斯地及戒期終入學戒堂早夜孜孜無片刻怠惰凡五七年如一日所有諸大律部遮制軌範不由師教取次領會如智圓律師所著會真記等文當時深於此者謂其超出六十家釋義之外其旨趣悉為之貫串非宿植慧本能如是乎時閔祖觀其力行不怠擢師為教授領袖闔山師忘人忘我竭其心力輔翼數年閔老人疲於津梁集衆將法位授師師堅辭再三祖曰此龍天常住豈豫一人之私况合山大衆皆然爾敢固違之乎師乃拜受謹慎兢業惟恐失墜於每年皇上萬壽聖節制府將軍率諸宰官父老千餘人來山修禮祝延無疆道場四十九晝夜齊宿山中二時拜祝罷與師盤桓問答律中旨要能令諸公敬信咸謂佛事惟寶華山道場戒律精嚴終始如一他處罕有及之者壬寅春仲示微疾師知世緣止此於二十日遵諸祖傳授家法集衆將衣鉢戒本授於文海監院記莂時海出稽首哀辭師曰吾志已定無多讓惟勉守老祖締搆弗致毗尼减色吾目瞑矣餘無他囑遂歸臥室惟注念淨域至三月初四日早命具水沐浴合衆稱佛號數百聲奄然順化師生於康熙丙辰正月二十七日入减於壬寅三月四日世壽四十八僧臘二十一茶毗時火光如五色雲霞散布遍山越三日收遺骨奉歸一葉庵左五十三住持列塔之次焉辛未探花叔琳黃公題贊曰自安豐鄉來寶華寺入不二門聞第一義因戒得定因定得慧龍象當筵獅子據位猛火然頭金篦刮翳假佛威儀為衆生利律精科條法無文字以堅忍力了死生事四大本空空亦粉碎色相見我無乃疣贅薪盡火傳衣鉢有嗣是好兒孫五體投地儀徵隆覺寺敷和律師諱普悅江南江寧人也姓趙氏父宗韓母鄭氏幼習儒業應童子試已有聲乃志切出塵自剃染得戒後即依隆覺冶牧老人精研律部冶公見其操履篤實無纖毫踰矩矱遂以內外院務委之凡春冬戒期調伏苾芻為引禮諸師之冠焉牧公遷化師繼席願力益宏心行愈謹嘗慨南山一宗為入道之始事非踵其遺迹行其掌故遂為圓具也必於師授導引之旨晝夜研究著一番勇猛精進夫而後討核律部甫有入處否則終扞格而難通也以故傳戒規儀較冶公更加嚴肅不敢少涉圓融十方衲子來者悉遵其陶鑄大江南北戒香幾遍與千華剎竿兩相輝映矣揚多好善之士就師請益者指不勝屈而供衣鉢助齊糧以資戒緣者無歲無之至於興土木去華從實尤足為後輩法座下得法弟子岫雯清等二十三人皆為法器師生於康熙三十三年七月二十二日示寂於乾隆三十一年九月十日世壽七十有三僧臘五十有三傳千華之六世為隆覺中興第二代焉真州天寧寺覺然善律師姓王氏河南開封祥符人也幼依相國寺出家即於本寺受具足戒後參方至金臺古林諸勝境遇隆覺冶牧老人一語契心遂付法焉乾隆甲子歲冶公受天寧寺請命師為監寺冶公示寂師繼席方丈傳宣戒法復建藏經閣及殿堂廊廡規模極其宏整後又移錫於儀徵寶坊寺不數載其殿宇亦輝煌生色矣二十四年己卯二月十六日無疾而逝建全身塔於蘊微山之後灣金陵慈應寺僧樹律師諱實培刊江甘泉人也姓石氏幼年賦性耿介不事繁文素仰空門高潔因有二親在堂不忍遽離後得兄弟成立能代定省之勞遂辭親渡江遍訪名宿乃至句曲之胄王山得遇雪崖禪師即求剃度師見其品貌不凡舉止端方將來必為法門柱石遂剃髮於寶山寺焉康熙五十九年秉具於千華次參慈應由副寺以至監院璇公和尚示寂即以方丈命之自主法席後精嚴毗尼愈加警惕乾隆十六年閏五月二十五日示寂世壽五十七僧臘二十一有嗣法弟子古雲澄焉皇藏峪瑞雲寺大樗律師諱如果長邑馬氏子幼失依怙五歲乞大慈珞和尚度十五精儒業十六習內典年二十珞師脫去始志遊歷二十三登千華戒壇秉具後即參濟和尚於維揚晝三夜三不容走作兩月間默識心要尋溫舊習遂得不二之旨復上寶華博綜律儀事任羯磨并掌翰墨嗣又遍訪浙右諸名宿如佛日璿公天目晦公皆與契機親炙之一日晦和尚云凡參學人不可得少為足百尺竿頭還須進步明訓在耳宜深佩服由是縛茆於東目分經臺下屏息諸緣聲韜木石雍正戊申歲蒙本師藥老人慈命三詔不得已而推向人前應箇時節每撫膺自愧無補法門唯以衆務之暇心切己躬偶閲雪峯鰲山因緣頓將從前礙胸之物豁然氷釋矣有示衆偈曰烈焰爐中建戒幢本無餘事可商量凡情聖解皆鎔盡一句彌陀是道場又數遭歲歉幸衆之齊未虛乃作偈曰瑞雲巖下老愚夫千指重圍道不孤一日兩餐藜藿飯六時持誦報皇圖乾隆壬戌時年五十坐夏二十有七也揚州慧因寺曉聞律師諱實長江南丹徒錢氏子也母潘氏生師時無乳使他人乳之不就食飲以米汁不受至七晝夜父母憂之尋得乳能食喜茹素幼隨父渡江值風暴大作同舟者無不恐懼師微笑曰祇是心不定耳何懼風浪耶父曰此時心如何得定師曰定在平日父頷之將冠溯江至金陵永濟寺聞僧誦彌陀經信其極樂如是清淨如是莊嚴回念婆娑渾身汗出而出塵之志决矣父母念其素行非俗漢遂命投和州福興寺密嚴和尚剃染時年十八閲三載禮寶華文公圓具未幾出山遇一老宿曰好箇本分禪和子往何處去師曰參禪去宿曰參禪曷若學律師曰我學律無味宿曰孑明心理為戒悟徹本心為禪名雖有二理則歸一且今時秉佛制而飭僧紀者寥寥汝當精進持律去師於是涉江而北依廣陵石塔和尚撫生公研究律學是時撫公有淮南律虎之稱見師行履篤實逈出時流大器之尋命師居侍寮朝夕教誨將欲記莂師以朝四大名山為辭撫公即親為置操方具期以行腳歸再承記莂無何而撫公遷化先是撫公密囑朗公曰曉侍者法器也斯人必大興法化汝當善視之及朗公繼席即授法於師城北舍利律院為師剃度兄牧山和尚道場牧公叩朗公請師為輔弼朗公留連匝月牧固請始命往舍利師一至舍利便以叢林為己任內外院務仔肩弗辭其煩劇勞瘁人實難堪師處之晏如也齊厨時或告竭師嘗棄衣履以充薪水十方衲子德之郡紳王山又朱與白諸先生偕同調十數人於舍利結蓮社為投閒養性之地地雖僻而名振廣陵矣牧公圓寂後主席無人遠近緇素屢舉師正位師悉辭不就會郡紳鶴崖汪君闢廣初地一新梵剎庚申夏四月郡守景萊高公率紳商耆庶於佛覩明星日送師方丈師卒不獲辭乃勉就領衆自是艱苦較前為尤甚凡春冬戒期調伏苾芻寒者衣之疾者藥之老者安之以故十方求戒者動即數十壇平山堂之左有惠照寺即古木蘭院唐王播題詩處也地頗幽邃住持者力不能支邑侯徐公嘉師行履率紳士特請師攝住未期月漸復舊觀辛未春聖駕南巡御舟經過舍利師率衆奏請寺名當蒙俞允是年九月鹺憲吉公賫御書慧因寺額到寺時顧萬峯鮑步江張冠村與豫俱有詩紀勝嗣此來瞻仰者日繁挂瓢鉢者日衆師益加黽勉應接無寧晷夜不脅席而臥晝常并日而食衆僧初以為異久之悉為讚歎不已癸酉八月師世壽五十四方宰官紳士林下諸善知識爭為詩歌讚頌苟非道行高卓聲華茂美曷以臻此師素無病忽示疾三日端然而逝師生於康熙甲申八月二十五日入滅於乾隆甲戌九月一日世壽五十有一僧臘三十有一坐夏一十有四其門人鑑清能安宗興諸大師將奉龕於惠照之西偏與牧山和尚共葬一塔請豫為師傳以豫與師法門往來𡹁二十餘年知師最詳余不獲辭乃略述其行業云論曰師四十誕辰時隆覺冶牧老人作序文祝師其序中推許真實以為後來之秀屈指無二人焉夫冶公為海內律學宗綱持論最嚴豈漫為許可者况後此十年更加精進耶於戲師洵一代之律師也哉道潛居士陳琅撰舍利牧山律師諱實省姓何氏江南寶應人也父正生母王氏世有隱德誕師時母有異兆六歲就學孰師授童讀四字句過目不忘聞僧誦經持咒即能隨口念出年十六决志辭親投和州福興寺密嚴和尚剃度遍覽內典閲四載至寶華納具於文海和尚文公見師囑執事曰此子非凡器也送入戒堂是期求戒者數千指而師為之領袖圓具後遂依止學律二年一日至山麓灌木之下見烏哺雛忽念罔極深恩歸里覲省後至吾郡舍利禮思曇老人老人留為輔化以南山付囑侍巾瓶未二載老人辭世遂以法門重任委師繼席於是宰官紳士無不敬信雍正癸丑師應兩淮紳商之請開戒於本山求戒者數十人同居衆僧千有餘指三月之內緇素樂施齊供不絶圓戒日佛殿香煙結成雲蓋殿上有紅光燭天遠近觀者知斯地必成寶坊是年五遊五臺未幾歸來便興土木師質孱弱不耐勞劇創建未成已染微疾知願莫能遂將內外院務交於曉公代理獨居一室精修淨土至建子月辟穀唯日飲苦茗數甌至次月二日命侍者取水沐浴更衣合掌念佛端坐而逝師生於康熙甲申示寂於雍正乙卯閲年三十有二僧臘一十有二為舍利開戒第一代焉初師之參思老人也具大人氣相慨法門秋晚冀遍參海內名宿踵趙州芳躅辦十貫草鞋錢必使佛祖慧命塞破四天下得三學之要歸為大千之覺海志甚偉也及雍正十年以後世宗憲皇帝振興佛法天下高僧沐聖恩晉禪師號而賜紫衣者大有人焉是時師雖北遊五臺緣南人質弱不能久居北地卒未得遇而旋滅於故所為可傷也又聞之曉公曰師嘗孤坐彌月忽有得處呵呵大笑曰於一毫端現寶王剎坐微塵裏轉大法輪此真實語古人豈欺我哉每遇禪人拈弄公案牽扯葛藤紛紛聚訟師輒振威一喝衆為色阻或轉一語耆宿亦為之心折今歿且二十年門人奉龕於寺曉公居方丈有年因緣福報日盛日隆不為師謀葬所必待斯地沐今上恩隆宸翰炳炳院改為寺又俟曉公遷化師門人定公繼席終與曉公共塔一處此其無故也耶於戲師之事蹟固未張皇而師之志願可謂遂矣而又何憾於年之不永哉道潛居士曰豫年三十以前惡人語及佛法慮其害吾儒也見王阮亭司寇遊華山序中有浮屠之說與吾儒道德仁義之旨了然不殊之語深不以為然故昔年與師語多不契二十年以來覺箇中事本明人人具足何有儒釋之分也今欲與師高談不二了不可得其或俟師再來耶江都陳琅撰宿遷極樂庵太初律師諱來照姓樊氏彭城鳳山人也其父禱於雪山寺師始生幼時靈根夙植就外孰已卓異諸童矣年十二遊雪山見寺僧威儀輒感昔緣有在辭親投喚生和尚為師晝夜持誦終歲不休年二十四納具戒於桂昌律祖窮研藏典北請南參圓通三學後歸極樂慧老人深器重之由書記遷羯磨首衆遂入室焉至雍正戊申三月一日慧公因患目疾命師主席力行十有四年未嘗改廢繩墨復應邳宿士大夫請主名藍傳戒孜孜無倦色嘗𡹁示云叢林授受間最須珍重必其識見超卓德行可表才可暢其本懷且不愧座下有人若不審其來歷只輕易放行如稻麻竹葦何關輕重故師座下雖盈千指而一二依之最久者一衆視之應得衣鉢默扣師意乃曰渠不得吾真血脉衆大異之乾隆六年八月慧老人順寂心喪盡禮至七年五月十三日忽書座右曰我七月十九日且去矣及期衆以極樂法脉為請師曰今將院事且付德明弟主持爾等竭力任事當與我在無異至午刻跏趺而逝師生於康熙二十三年正月初一日終於乾隆七年七月十九日世壽五十有九戒臘三十有五師既滅度而同門德明悟公宣揚祖道紀綱後昆毫無踰越至十年五月二十日示微疾二十七日請宗長麗庵錫公輝遠月公洎集衆告曰吾住無心去亦無口向下文長大家出手說已端然而化是師亦不輕授受無負正傳寄記之重矣論曰太初律師真血脉一言在昔多斥為庸妄然南山律祖遙承正法之統為百世師者若而人則吾太初公言繫九鼎之絲為天下法者若而人蘇州真諦寺曉雲律師諱宗起東魯魚臺劉氏仲子也父升善有衍慶母楊氏夢彩雲繞室而有娠生九齡有南陽相若和尚見而奇之欲扳師出家父母知師有夙根遂允其請年十二即披剃焉後稟具於真諦利咸和尚座下復遍參名宿得窺堂奧雍正己酉歲仍回姑蘇得法於天慧律師乾隆辛酉春繼席真諦惟以至誠接物不事華飾人亦以此敬之乙酉秋七月三日無疾而逝世壽七十有一僧臘四十有九江陰圓覺庵慧海律師諱宗深本邑程氏子也幼依圓覺庵出塵師剃染朝夕禮大士像得大智慧閲諸經論恍如夙習年既壯圓具於本城十方庵未幾即繼席圓覺重整院務率衆焚修三十餘載後復移錫十方庵傳授毗尼有戒序流通於世焉聞思御章律師法諱海注清河縣施氏子幼孤早年披緇從師遠遊足跡遍天涯於福建之鼓山圓具師精勤不怠嘗自勵曰覔佛覔心須要時時行不倦方為妙用問山問水還在久久力無窮便得知音後葬親遂歸就本寺聞慧和尚棲止復精律部及為教授其愛育人才成全衲子雖有一技一能無不被其榮接凡講解律部必詳研欵切能使人人析義而後已尤篤孝行躬雖右寮親操侍執聞祖老而得遂頤養師之力也祖歿既主法位則續置齊田修建方丈補殘葺廢歲無寧日至於求賢才紹南山之命脉恢祖道續律焰之分燈故叢林有誨人不倦之稱或曰師何不少憩以養中和曰人命無常一息不來即成他世一旦捐棄而作千華之罪人也後得秉慈一聚用文嗣其法師即集衆告曰今日可息肩矣遂命秉主法席而聚公輔之師既退日誦法華兼修淨業凡四閲寒暑未嘗暫輟至雍正乙卯正月二十日晨起辭衆念佛而逝不幸秉公相繼辭世聚律師嗣席之後建塔躬修卓然自立其不私厨庫不避作務等猶從遺制至諭律範之精微感化之嚴密或踵門而皈心道行或馳簡而延蒞戒壇風動四方香花填塞固知本達千華蓋亦師之選擇得人光裕聞思矣京都淨土殿𢋫如律師徐州宿遷縣陳氏子幼莊重厭俗囂依本邑法華社懋林師剃染壯遊京都圓具於萬壽戒臺寺憨默和尚座下矢志律學履罔閒時有報恩道老人一見即目為法器遂心印焉師為人沉靜寡言不事應酬且日有定課務以古人為規此亦確有所守不隨衆為俯仰者世壽六十坐夏三十九於乾隆二十九年三月初五日預知時至安詳而逝黃石悟明律師諱普開族姓葉氏幼禮然燈長老剃染內懷貞敏外具嚴如其師祖慧公見而異之已知為不凡子也未幾師祖西遊乃自發願苦行修持建梵宇於東山晨昏禮拜設茶亭於西路渴濟行人運佛祖之慈心行菩薩之願誓具秉於古林法續於南山既而主席本山傳尸羅之妙法精究毗尼闡梵網之慈𭥎規模後學師範來昆其功曷可勝紀哉師於乾隆辛未預知時至無疾而終得嗣法三人東山維賢慈韻松藏石玉月山道來從皆篤實修行亦將為南山棟石焉古祖下八世京都潭柘岫雲寺靜觀瑞律師法嗣宿遷壽聖寺雲浦珠律師法嗣默然佑律師中嶽嵩律師酌宜義律師成章文律師月照朗律師徐州廣濟寺大雅憘律師法嗣金陵寶華山珍輝𤤯律師法嗣文海聚律師寶華有傳氷壺玉律師泰州天玉銓律師天寧金陵大報恩寺三藏公照月律師法嗣致和純律師崇法貫通九律師獅山如滄福律師蘆瑭滄月澄律師宗紹慶律師延壽修然輪律師泰州寶光朗律師龍華涇縣石山臺泉寺宗明徹律師法嗣自如見律師臺