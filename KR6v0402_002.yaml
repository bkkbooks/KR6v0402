師問曰潭柘衆多少師奏曰或七百或八百復問齊糧足否師奏曰亦不缺缺亦無有餘聖祖嘉其朴實賜紫衣住持二十餘年興建頗多茲不具載六十一年十一月三十日召衆念佛無疾而逝世壽六十一坐夏三十九塔於振公塔右為潭柘第三代律師寶華慧居寺松隱律師諱真義江南揚州府江都縣宜陵鎮曹氏子母戴氏感異人授青蓮而生父母知其非常人也稍長就傅即知求書中大義不屑屑於句讀間孰師亦歎異焉父母復思青蓮之瑞即送本鎮投子寺禮靜生師祝髮一見教典如遊舊路每思佛法綱宗不出戒定慧三學年滿二十遂渡江登華山乞受具足大戒於定庵律主一期之中著衣持鉢威儀動靜莫不端莊整肅定老人默覩信為不凡重簡於心常課外日夜精研律部終歲靡懈凡有常住公事必先於衆不避艱辛及為序首董率後進善誘多方無不感服每曰天台開教門之先其預設律宗制度悉與西方未來之經印合教非律不能精嚴也以此知捨戒律而談宗教如匠氏之廢繩墨尚能善其事哉師欲兼靈鷲三宗擴充一心遂順流下吳門渡錢塘登天台一時有道大知識參請殆遍回里後曳杖入京師遇天寶王公周護法問所從來師道其實即以延壽蘭若請住持之未幾立願行頭陀行一時隨喜歸禮者傾國明年請赴給孤寺開戒鱗附蟻聚輦下滿漢諸護法室無所容期畢不半月定祖知四大分散馳命促師還山師接祖命諸不暇顧出都門無問晝夜兼程而行及到山不旋踵即進方丈禮老人足問訊起居老人見師喜慰之容溢於滿靣乃曰望公回山相期輔佐法化乃集衆以三世衣鉢戒本親手授師命繼祖席師敬謹受命惟恐隕越戒期纍開來者四方雲集每期數千餘指而莖粒同餐不以天時豐歉易心惟以雷電轟掣之機花雨繽紛之教時加提撕嗣是夙興夜寐臨深履薄小心翼翼未及五旬而秋霜點鬢矣因而譽聞遠播上達宸聰癸未仲春聖駕南巡徵師行在敕賜慧居寺額御書心經金剛經各一卷丁亥春翠華幸江南首臨本山荷蒙俯詢寺中開創建造巔末師應對詳明喜動天顏遂飛白書蓮界雲香四大字賜銅殿精持梵戒四大字賜戒壇復於舊殿賜湧香林三字於方丈越一宿即順流往姑蘇武林西泠雲林天竺淨慈雲棲諸山大剎凡月餘逮駕回至維揚時已初夏矣師渡江恭送復賜金箑彩筆淵法帖等物遠近聞者莫不慶師之遭遇寵賜優隆為山門希有之盛典苟非師之道德曷克臻此師才五旬精力尚強一旦示微疾集衆囑維那閔緣曰此遞代傳持之衣鉢戒本也今付於汝主持本山羯磨冶牧教授體勤為左右協力不可更換復囑合山大衆各依淨戒為師依戒而住七日後吾當行矣果於二十九日午沐浴更衣趺坐而逝世壽四十有九僧臘二十有八坐夏二十有五說戒利生事畢門弟子等奉全身入龍山南張冲一葉庵左師在日親自監造五十三所列座環繞卓立之中塔焉師道貌魁梧法立清遠頂湧霽月髮甃旋螺不厲而嚴不莊而肅折攝洽宜涇渭不爽望之即之畏愛兼抱真佛法干城律門砥柱是不可以無述云興化般若院玉文律師諱照碩沈姓高郵巨族本關中西安人始祖官於州因家焉父獻廷母姜氏夙信三寶年四十乏𦙌乃乞靈白衣大士誕徵夢異年十五依本郡普濟庵隱白元公為師棲心內典博究羣書年十九雖未稟戒已冠輝山之質辭隱適維揚參具德和尚一見即期以法門偉器閲明年就華山得圓具於見月律祖尋授典客兼引禮職年二十六復造江浙諸禪板講肆於是三學底蘊悉相折衷見祖聞其操乃馳命旋侍時年已三十矣未幾定祖繼主洪規師輔弼紀綱探賾持犯解行相符聲稱益著遂以衣偈付之辛未春昭陽緇素仰師道範以般若古剎削牘僉請師不獲辭航江以應之當是時破屋穨垣陶漁比伍又值年歉饘粥不繼師處之裕如也歲常傳戒都以寶華風規津梁來學又嘗應雉臯之集賢宏戒凡瓶錫所到四衆喧闐而師之高風清範溢乎大江南北矣歲丙申制臺赫公邑侯盛公嚮其道咸有題贈至乙巳秋示微疾即以院事交正元本主之九月八日同衆午課舉讚佛偈歸丈室跏趺而逝世壽七十五僧臘五十五法嗣正元本等建塔以奉全身餘詳行紀慈應眼聞律師諱通明俗姓李氏滁州人也自襁褓時性即茹素年甫弱冠泊然有出世志康熙庚申歲皈依牛首山宏覺寺以忠師祝髮居未久稟戒於華山定庵和尚及受戒具彌復精勤始聽律義遍訖便講辨析文理綜核指歸苦學毗尼歷多年所師一日偶閲雲棲法彙至凡心未盡聖果未圓之句即痛念生死更展精神行般舟行於昧公塔院越三寒暑其志不墜定老人窺其法器不凡具大願力故印證焉命主領慈應院法席事師稟祐居醇含章縱哲砥行飭躬架德緝道篋蛇能翦心猿久制譬圓珠之朗潔若春雲之靄和以故道風遠播緇白傾誠世壽六十法臘三十有九於康熙五十九年示寂塔於慈應之前山贊曰可以為法者律可以宏法者人無人則律法不行無律法則人無拘束師乃律中虎也可以為法矣皇藏峪瑞雲寺松柏律師諱學徹俗姓吳少為洋客被賊難立誓出塵投羅漢寺顯通師剃染稟戒於寶華山入槽厰盡力苦行定祖命掌內藏師自此每遭無事風波怡然而受毫無退志祖命教誡後學衆仰風規祖云老僧最後法幢多賴二松遂將千佛慧命一時付囑祖云爾當分化一方不可懈倦師奉祖命往臨清接待十方復詣彭城創寶藏院又宏戒於皇藏峪瑞雲寺修廊廡置齊田一時雲水奔騰龍象蹴踏歲甲午偶因微恙遂將方丈付囑門人藥屋嗣後專修淨土餘無介意至明年八月二十三日清晨從容召門弟子曰法道𡹁秋各當努力吾有末後一句諸仁者還委悉麼言訖即入體性虛空三昧是時山林震響百鳥哀鳴師世壽六十有二戒臘四十有三百日後門弟子等奉全身塔於龍山之前銘日於戲南山正脉千華嫡旨道場三座法雨沛施三根普潤無彼無此藥屋焚香槩紀終始鳳山龍興寺俊雯律師諱溥㻽別號借堂族姓王氏毗陵人也師齠齔開佛號即歡躍稍長涉詩書頗通大義父母歿有僧持𥁊過門誦心經潛聽至無智亦無得即有出塵之志年十四投本邑崇聖院依瑞可師剃落自是專以禮誦為事年二十四登句曲之寶華山禮定庵律祖受具戒安居學律兼侍書翰己卯冬受記莂委較尼戒事義嗣奉遺命輔弼有年乃赴虹州廣慈庵及釋迦寺之請傳戒期畢乙未秋受鳳郡諸紳士請主大龍興寺方丈凡十有三年當師之始來是山也寺宇傾圮荒蓁滿目而鳳又當明季兵燹之後井邑蕭條非若都會人文所聚吳越商賈之區可以布金祇園檀施山積也惟師胼手胝足苦心勞力卒能修葺其佛宇封殖其樹木又以餘力建方丈僧寮厨庫器用無不備具至於儀範有條敏鈍同誨俾灌莽叢薄之地蔚然成招提勝境焉此非矢志純一堅固不回者其能然歟師寂於雍正五年丁未十一月二十五日世壽六十有一僧臘三十又七嗣法四人奉塔於本山之陽婁村畢誼撰維揚石塔寺撫生律師諱學倫別號幻堂姓梁氏浙東海昌民家子生於順治丙申歲終於雍正戊申夏四月世壽七十有三師年未二十喪父母四十學浮屠法越一年入寶華山受戒於定公又三十有二年示寂於揚州之石塔寺僧臘二十八坐夏二十三既滅度後而嗣門弟子乃奉其體骨歸塔於建龍寺之西且述其修持梗槩而乞銘於中州蘧村景公銘曰作佛有性蟬蛻轉裳明神啓夢舍利呈祥朱殷貝葉梵夾生香如蓮半偈宿孽消亡法雨沾溉稼庾倉箱千華闡跡石塔相望三十餘年建智慧幢譬如食頃作諸道場人天洽願善果圓明除痛示化性海汪洋顯白月相違露草光衆仰面啼鳥悲引吭不歸普同永志弗忘揭銘石上嗚呼幻堂公復欽師道行而為傳曰撫師始為童子即悟絶人經史一過即能了徹年既長有志仕進嘗授江西吉安府之永豐邑守偹夢感神人語遂棄職去削氏入僧籍初剃染於清河之西來庵依本師瑞亭精研大藏已而聞人言離戒修行猶無足欲行無翼欲飛師爽然自失即渡江禮寶華山求戒於定公持四分律復立願刺血書楞嚴報恩洎兩乘布薩諸經既復思參上乘瓢笠遠引登天目遊天台禮阿育王舍利塔恆言謂舍利示現必有大因緣師果覩赤耀如丸瑞采騰射心竊自喜且自異也後回寶華未幾即受記莂持律精進如是者五臘自以書經願力未畢孑身至揚州準提庵閉關禁足刺血書華嚴經功既成士紳耆舊懇請主席於西城石塔寺寺先為三昧和尚宏戒之所屢遭歲歉鞠為茂草師矢願聿新虔懇歷年人天共應復修般舟三昧闡發戒光機緣輻輳癸巳之春大悲閣布薩堂相繼告成苾芻雲集丁未冬復建玉石戒壇贖置飯僧田數百𤱔樓殿寮廡無不秩然嗚呼始至之時為瓦礫場佛力所周莊嚴輪奐師雖芒鞋半海宇而修持證果蹟著千華晚歲慈雲流輝石塔毗尼一燈茲為不泯矣師嘗宏戒於鹽城之廣利泰州之朝海時州人婦有怪疾自謂宿愆十年祈神弗能解一日自言非撫律師不能救拔師為懺悔果即脫然又應鹽邑永寧之請時甲辰春𠎝暘不雨屢禱不應師以瓣香祈佛立沛甘霖師字撫生邑人以為撫我生我名不愧實也是秋海潮泛溢溺者無算師持大悲懺百日幽濟慈航凡造請所至四衆改觀臨衆接機老而無倦其追隨受益者日填堂宇嗣法傳律高弟有二十八人師於石塔示終之前七日集衆宣戒以衣鉢戒本付其弟子朗清和主席自謂少時迷昧唐喪光陰證道不蚤今為昧祖了此公案幻緣已盡不復久留至期合掌讚佛安坐而化師之遺命茶毗後以骨歸寶華山普同塔中邑人以師宏法有年悲仰不捨爰建塔於城北俾得祭掃雖然師之化身千億何地不見本來豈必歸骨普同乃彰初願哉京都瑞應寺律師諱性證字檀波姓熊氏為江西南昌右族父時英母陳氏並長齊奉佛生二子公居長將生前一夕母夢幢幡降其室在襁褓即茹素長遭父母喪妻亦亡既公遊京師寓龍華寺有藏經閣之感悟遂有出塵之志就德潤公剃染旬餘詣寶華圓戒精進希有禮拜達旦定公器之遂傳法焉因剃度師疾急招之北歸師示寂命主席讓其同門公即結茆保定三臺村修杜多行康熙壬辰歲左都揆公招主龍華將為明年皇上六十萬壽祝釐道場慕公戒行請主方丈使者三往然後應命揆公捐俸重新梵剎工訖以其事聞上賜名瑞應併法雲真際額明年萬壽届期公登壇說戒風動四方無不景仰寺中舊植文光果樹至是始實雙果並蒂馳獻行在上大悅製文光果詩從臣屬和傳為盛事公進道堅勇過午不食冬必露頂夏必重衣每至春傳戒法歲以為常公生於順治十六年十二月一十六日辰時示寂於康熙六十年正月二十五日辰時世壽六十有三僧臘二十有七法嗣瑞林暉輩凡三十三人後奉全身塔於都城鷹房之南寶應蓮池庵省愚律師諱成慧姓劉氏舊籍婺邑父爾位母蔣氏順治年間祖任江寧儒學遂家焉師始離襁褓性好茹素年二十七父母相繼而逝即投溧水壽國寺木陳禪師法孫素文和尚剃染精研大藏廣釋生靈始知非戒無定非定無慧故辭師詣寶華圓具於定祖和尚時年三十二矣於是遍參知識契悟心元至三十七歲復回華山職司副寺兼理戒堂祖以衣鉢授之辛巳歲縣主王公山主成公及邑中紳士敦請住持蓮池方丈入院時苔蘚盈庭瓦礫塞道師乃募贖田園開耕草場殿堂廊廡煥然一新莊嚴佛像整肅規模每歲安居說戒悉遵祖山遺則可謂檀那樹福之勝地雲水養道之祗林也因師年高神憊功行益肅衆檀信遂為建塔於蓮池之西南焉壬子春自知時至示諸弟子日蓮池傳法謹遵見祖遺訓以袈裟為重不許剃度子孫余去後無報訃掛白有違佛制語畢端然而逝師世壽六十有八僧臘三十有四坐夏二十有七也蘇州福生庵明極律師諱普智姓范氏籍本湖州文正公之後也幼齡即長齊繡佛慕西方之教年十七依福生庵自徹師剃染得戒於寶華山定公律祖復付法焉康熙乙亥歲重修福生開拓基址廣闢殿宇遂為東南名勝之區後有玉峰勝蓮庵法席久虛崑邑紳士仰師德行咸相造請師不獲辭乃至勝蓮崇修導化經歷數載復以年力就衰仍歸福生養靜示寂之夕鼻𡹁玉箸尺許隱現者再非具有實行何以得此師生於順治戊戌二月二十九日終於雍正癸丑十二月一日世壽七十六僧臘五十九建全身合於齊門外長邑之西石缺宿遷極樂庵桂昌律師諱興祥姓熊氏江西吉安人也初母夢老僧投錫而生幼好靜坐根器不凡及長父母俱亡遂北遊至淮郡剃度於菩提社隱名大師求具於寶華山見月律祖尋依極樂湛公十載復辭南詢參報恩大覺國師凡名山大川流覽幾遍議者謂師不韜跡潛修而奔走風塵似非清淨寂滅之志孰知道無往而不在心無往而不存靜固靜動亦靜乃為至靜寂固寂感亦寂乃為真寂其中旨趣敢易擬焉師胸無蘊滓故自去來而不方物後回陵山力般舟行百日自是心愈豁然超曠會委逢源莫測埃岓適有不器禪士自都門來師探其機要器云念佛不離參禪參禪不礙持戒百千三昧不出心地一法師即恍然曰戒體圓明戒性空寂反觀本源空性亦滅了無持犯是即心地法門若存一念見聞知覺便名破戒况餘念耶器與湛公擊節首肯咸謂將來唱導先覺者也遂委居首座即闍黎位嗣是嚴究毗尼精研廣律服勤十載間多密行有難殫述者甲子冬湛公示寂師主法席四方雲集日盈千指師持已御下重振規模深得叢林大體至於殿閣輪奐田園增廣猶其餘事不足為師道矣辛丑十一月初八日師忽集衆誡之曰納僧辦道須具一番鐵石苦心更兼一切解脫凡應事接物如水印月痕一念不留汝輩當精勤修省明午與衆別矣次早緇素畢至師以衣鉢付慧徹繼席既謝衆又曰我去後切不可例世俗有違佛制言訖跏趺再扣之已入無聲三昧世壽八十四坐夏四十七傳戒二十七期嗣法慧徹福等一十三人各守遺訓克荷先業建塔於縣北之五華頂爰為贊曰猗歟桂師依止湛公見性明道不愧心宗猗歟桂師慈悲定慧普度衆生有教無類猗歟桂師戒月孤圓光吞萬象塞地彌天廣西丙子解元劉如晏撰淮安普應寺友曇律師諱溥範姓王氏山東兖州嶧縣人師系千華四葉嗣極樂為二世開普應稱第一代焉師本仕籍少通儒業年二十值僧圓菩薩戒聞是心作佛是佛是心遂頓悟元旨投三皇寺剃染矢志登山求戒於定祖期畢祖喚曰汝演教人也兼律學好依止五夏復命遍參時往宿遷極樂湛一律師見而器之即留為輔化囑宗南山侍錫南北講經傳戒後隨淮郡圓明寺戒期畢湛公命師繼席遂高樹法幢廣行律制嘗與四衆結社修懺講演教觀兼行苦行遐邇皈從時衆紳士同劉護法堅請移錫普應師惟瓢笠自隨行解相應門庭嚴謐梵宇鼎新殊矍鑠無老意一日忽集衆曰吾年八十七世緣已化畢大德徹洞聞堪紹我法窟說偈已命衆焚香念佛師已跏趺而逝矣徹公依法闍維建窣堵於喜見塔之北相望湖山之上焉毗陵永寧靈躍律師名學潛浙之平湖人幼穎悟習儒書尤於貝葉上乘一覽弗遺深嗜篤好時參妙解年十九祝髮受戒於姑蘇真諦寺持行嚴密寒暑無間既而歷天下名山延訪佛祖證度之地餐風味道披雪傳空徹悟本來歸於自在遂於獅林寺得法為南山正宗中興下五世永寧第一代焉毗陵舊有興寧律寺創自李唐洎宋元以來叠遭兵燹基址蕩然老屋數椽傾圮將𥁞師遊笠過此慨然振興思擴前業朝夕與其徒持守律法潔修精進遠邇翕然僧衆歸依規模式擴高甍廣座殿宇鼎新巍樓上薄霄漢就其下作波羅提木又之壇圍以文石甃以古甎宏整瑰麗卓然大觀為常郡諸蘭若所未有經始於康熙庚寅辛卯之間落成於乾隆戊午己未之歲於是倚晬像於金光沸潮音於空際廢壤復為清涼法觀而師之經營建造興修三寶內外秖𪫠𡹁三十餘年未嘗稍懈戊辰歲師年八十有二於春和佳日設龕召衆講法說偈自坐龕中談笑示寂法嗣通一幼凜師訓益淨益嚴宏恢前功戒子雲集於以徵靈公繼往開來振鐸於吾郡者其教澤為孔長矣贊曰吾常梵剎以百數然能力守宣師遺教者近無聞焉有之自靈躍師始憶余兄阮尊解組歸好從靈師遊嘗以泉明自擬師喻之曰吾非遠公儔此間無地著攢眉客也奚童或私挾飲具往侍者於山門外屏弗納兄深敬畏之昔程子見戒律嚴整歎三代威儀在是若靈公其庶幾乎賜進士出身福建按察司按察使莊令翼撰蘇州真諦寺利咸律師諱學圓揚州興化趙氏子生於順治辛丑七月十七日終於康熙戊戌八月八日世臘五十有八繼席一十三年嗣法十三人皆分化一方彰師道行示寂越三年其嗣奉龕建窣堵波於本寺碧祖塔院之左為真諦二世焉師甫言能誦佛號父母異之遂聽作佛子殆所謂宿根深厚者歟及長聞寶華山定祖戒法精嚴往求具足其後學律有年遍參名宿是時碧祖中興真諦高卓戒幢龍象蹴踏見師從寶華而至心甚契之親侍有年相傳其道殆所謂師資相合非偶然者歟及碧祖遷化命師繼席經營後事奉全身塔靡不竭力至於廓宏規修戒德遵崇祖訓啓迪後昆數年以來求戒者雲集殆所謂善繼善述者歟贊曰師資契合事非偶然碧祖創業利師守焉恪遵遺訓一十三年戒光普照戒澤普霑昔侍師側今瘞師邊以盡孝道以誡後賢從此相繼道法綿綿淮陰聞思寺宏範律師諱溥訓射陵彭氏子也幼依本邑延壽庵披剃年二十聞獨祖宏戒楚州詣壇圓具精研毗尼貫通律部祖深器之遂付囑焉一日謂師曰律學固屬精嚴心宗不可不究師復遍參名宿於吳門之碧巖和尚機緣相契命為首座長驗龍蛇於棒下既明大事旋擇天平山之陽縛茆自處因占偈曰井上枯藤鼠囓多爭榮豈若住山阿臨溪短屋留雲處香吐松華映碧蘿又刈茆占曰手握吹毛劍一橫誅茆那惜路重重深黃淺碧從茲盡顯出當陽個裏人嗣因獨祖北上命僧促歸監理院事力衛常住接待往來及獨祖訃至法輪律師以書命正位迎龕建塔輝宏祖道聲播兩淮聖祖南巡有司引師於袁浦接駕蒙旨詔見奏對稱旨聖情嘉悅至廣陵茱萸灣仍命和韻御書聞思寺額及金剛經賜之人皆幸為千載一時而師殊坦然於是歲之四月下浣示疾至初一日晨起辭衆而逝聖駕南回至楚州猶呼師名𡹁問嗚呼師若少待則邀恩衣紫又何難哉然師固不以此為榮或述之以志聞思於不朽耳韻松蓮城律師諱寂融姓張氏宛陵望族也生而具福德相及長愛淡泊清淨遂投益念大師出家賦性敏達智慧過人至於內外教典無不通徹年二十登華山於見祖受具足戒得侍巾瓶數載祖亦甚器之後以因緣事辭歸得禮翠微心公和尚一時師資道合授之紫衣傳以毗尼於是刻苦銘心勉勵行持乃於韻松嶺頭冬湯夏茶接衆結緣寒暑不輟時邑宰陳公諱九升者聞而敬之遂請為韻松方丈西鄉檀越又請中興翠微律院自是道德昌隆於兩地戒法丕振於一時矣往年太邑祭祀皆用鹿饗因師請於陳公乃得免焉里人深感之暮年仍歸韻松多與縉紳君子詩賦往還每於贈答間隨機化導故文章之士皆願皈依也後邑宰王公又特起瓣香禪室而供養之師年逾八十鶴髮童顏人望之如兜率天中人也然其持誦修行老而無間預示以某年月日鷲嶺西歸至期如約不爽里人弟子遂為建塔於本山之左有碑銘文程繩武撰古林藏林華律師古甬元縣鄧氏子師將娩母夢衆僧受食中有一老衲眷盼久之而産揆厥夢緣宜祈佛庇遂求法名於里南大聖寺心融慧公心曰俗子投佛意期蔭怙若華藏林無畏風霜因名字焉師生而黠敏性不狎嬉親擕入寺見僧衆威儀戀戀不還親嘉其志命依心公祝髮一切經書授受不再時有隆野法師宏法夏邑心公偕師就席畢復之彭城值雲崖老宿談老莊於塔山衆多異之師獨謂學無內外內外在人欲大其心志妙其有無此二學可表裏而不可偏尚吾道大成如海納百川同一鹽味衆莫能易其說嗣是周遊壤外循歷天中達哲邵英悉皆訪覲凡住處案頭嘗珍二訓禪林寶訓緇門警訓熟讀博討志期力行識者知為法門之偉器也聞祇峰法主闡楞嚴於古徐之功德林不憚千里研窮數月不能無疑遂負拜南下直抵金陵參月潭大師於圓覺再預楞嚴前疑洞釋復值碧峰大師說法於普德命師代座師念法門重大非行不可乃結二三同志於普惠寺前力操炊汲廣植茶緣崇禎十年丁丑冬請戒於古林印含律師印公喜師敏達命掌記録翰章詞𧀉代為裁治靡不雅鍊時心公南詢掖師同往印視師言律是慧基非智不奉學未彌臘豈宜他事師以心公命不敢違同造天童密雲禪師令看父母未生前話才數月心公恙師扶歸未幾心公遂長逝後古林印公自楚還師導前同志數人詣林求戒印公已寂覺緣律師除師維那次年安居偶提所看話頭頓破羣疑順治三年西竺老人居碧峰新舊數千指獨識師鎮靜於言論之表老人曰藏公戒行素嚴學德俱備人天師表指日瞻光惜乎老朽不及見也是秋回古林覺律師命師闍黎復之幽棲值靈峯萬益大師千日期師與其數後淵源泉公主古林迎師說毗尼二持九十日畢念親恩罔極杖笠歸寧永城心休老宿請師說楞嚴四方學者一時雲聚期師主社接納雲水師聞古林有蜀僧之變束莊南顧會江寧當道請長安律師歸鎮祖席師君教授壬辰二月四日犍椎集衆以方丈付師是秋旱歉大衆以蠶豆數十粒充午鉢有私買市食以供師者師靣斥之曰大衆忍饑使我口腹獨實是陷我於不義師繼席以來接年說戒講經或赴外請或應時機修造殿堂寮舍續置園地山場且躬為傭作操不作不食之芳規於康熙十八年己未歲入滅其世壽夏臘未詳古祖下六世京都潭柘岫雲寺振寰福律師法嗣洞初林律師潭柘四代有傳京都潭柘岫雲寺止安越律師法嗣本然壽律師潭柘五代有傳京都潭柘岫雲寺德彰林律師法嗣育安福律師潭柘六代有傳恆實諒律師潭柘七代有傳徐州廣濟寺道主海律師法嗣本緣顯律師廣濟無相忠律師金陵寶華山松隱義律師法嗣閔緣松律師寶華有傳冶牧建律師隆覺有傳體勤禪律師別峯柏庵一律師三藏開賢得律師總持福昌真律師慈雲碧林山律師興化般若庵玉文碩律師法嗣正元本律師般若戒光續律師紫雲天微隆律師覺慧智律師準提維徵普律師自輝睿律師法寧靜律師海囊慧律師若虗念律師法華金陵慈應寺眼聞明律師法嗣璇璋觀律師慈應有傳曙天光律師興教思越政律師石龍自修澄律師孤舟省文學律師高座栴林恆律師香泉靜賢徹律師龍華京都極樂寺雪衍怡律師法嗣怡修俶律師保定湛恆清律師極樂明如福律師鎮海壽乾福律師大悲德美通律師盤山天祥善律師曇華興化立方賢律師法嗣義堂和律師金陵普德寺筏僧常律師法嗣湛明悟律師普惠智明心律師慧林壑律師觀音徐州瑞雲寺松柏徹律師法嗣藥屋懿律師瑞雲有傳本然倫律師唯然映律師大士徹元律師德真律師含容律師智宏律師虛如律師徹明恩律師寶藏西來律師鳳陽龍興寺俊雯㻽律師法嗣木山榮律師龍興介年長律師釋迦鑑中諦律師溥仁曇印玉律師臥佛金陵極樂寺懷空嚴律師法嗣道學福律師正修江寧孤舟庵宇瞻人律師法嗣雅文濬律師孤舟汝澤成律師承恩揚州石塔寺撫生倫律師法嗣朗清和律師石塔有傳雲圃珣律