body:
  text: 傳南山律宗古祖下二世蓮宗相律師分燈極樂有傳大會海律師分燈愍忠有傳中堂正律師分燈吉祥鄧尉藏律師兼宗臨濟三昧光律師分燈寶華有傳澄芳清律師分燈永明有傳茂林祗律師分燈報國有傳金剛福律師分燈福田有傳蘊空罄律師分燈三義大圓曇律師分燈香水隱微理律師分燈古林慧雲馨祖下二世律師傳金陵極樂寺蓮宗律師諱性相族姓高氏江寧人也相未出塵時採薪於江渚每宿蘆林蚊蚋咂其軀土木自得固已忘身雖未入道跡已具忍力內捨之行也遂厭樊籠就於本省攝山棲霞寺禮素庵法師剃染為僧次稟具足戒於慧雲律師所謂法兄法弟而又尊戒為親教師焉既𠫵僧數謹遵明訓是故以律嚴身自師師人慧律師遷化後相焚修塔院禮誦華嚴寒暑不輟以為常課由是道隆德備衆所推尊是以四方緇素一時雲集歸依者請相臨壇說戒為正員已歷幾登受化者不可稱數此誠師師相授化化不絶者也化緣既畢示寂本寺世壽僧臘未詳建塔於玉環山之右京都愍忠寺大會律師諱永海潤州丹徒人也海不戀世緣惟懷出塵之志於本郡平等寺剃髮披緇次受具足戒於慧雲律師既納戒已專攻律學惟務本宗律範精研道俗洽聞咸加敬焉從五臺赴京夢感太后云鳥窠禪師從五臺來也次日命內臣相迎果如夢中語遂請至愍忠上聞賜紫衣斯乃萬歷年間神宗在位之時是以南北英賢稟戒皈依者莫不仰止高風猶景星鳳皇之瑞於明時也由是闡化燕都化緣既畢後建塔於本寺世壽僧臘未詳所著五百問戒經釋盛行於世焉金陵寶華山隆昌寺律師諱寂光字三昧族姓錢氏廣陵瓜渚人也母感異夢而生年二十一禮淨源禪師出家初從雪浪法師習賢首教觀嗣遍參紫柏雲棲諸名宿具戒於慧雲大和尚時中興戒壇嘉師行解軼倫因付囑以宏律副座宣戒尋閉關小天台歷衡嶽登廬阜江州衆信請住東林池內白蓮不種自生符遠公再來之讖又於塔龕中得晉大尉陶侃所奉文殊金像憨大師目覩因刻石記之移錫衡山雉潭潭龍現形稟戒晉藩迎至清涼建龍華大會宏開戒法后妃遣使供紫伽黎回駐維揚興石塔寺掘地得舍利小金塔及斷碣有坡公石塔得三昧之語符合夙記次傳戒於金陵大報恩寺浮屠放光者二十餘夜都人請興寶華山山為寶公道場前此妙峰師供銅殿於其巔師至開千華大社學侶雲集殿宇聿新崇禎癸未詔師主修報恩大殿宏光改元金陵請師讖薦帝隨賜紫衣白金敕文武迎請於寺稱國師焉後應會稽嘉禾期畢還山為乙酉六月朔命侍者進歷期初四日午別衆衆驚訝師曰吾沗大明律師說法利生以答四恩𡹁四十載吾願畢矣久近常隨弟子輩有無學幻四宏願支浮嶽見空慧純然鎧獨行能香雪潤一如真若相空願雲顯幻住受煦杲照友蒼庭俞俞珠遍雲闔松影省達照明慧牧制等惟念授受任重取紫衣戒本付教授見月體命主華山總持三聚有疑其無疾難遽遷脫者師謂平生得力持毗舍浮佛半偈隨於光明金剛戒力入體性虛空三昧届午命具香湯自浴更衣曰體乾即行誡衆念佛跏趺端坐含笑而逝師道相清粹丰骨凜然慈悲接物孜孜不倦慨末法輕視毗尼乃韜晦宗乘專宏戒律足跡遍海內傳戒百有餘壇建剎十許處今戒嗣遍於天下所至竒蹟如江神求戒異類得度諸不勝書讀徹曰余觀牛頭諸祖道盛一時於生死之際感驗昭著有生而百鳥銜花虎狼給侍者有滅而鳥獸哀鳴逾月乃止者難以指僂至師所感皆不思議事出於造化之表自非神德妙行蔽天地而不耻關百聖而不慚者曷以臻此也願雲顯敘師行跡云其開法廬阜則白蓮現瑞符遠公之再來建剎廣陵則舍利流輝應三昧之懸讖慧祖以波離示現開戒日之光老人以繼起闡揚大前人之焰法道播於中原杖錫半於海內毗尼一燈至此大振允南山以後一人知言哉又莫若子矣即竒聞異跡恐驚視聽以蹈怪誕略而不書然口碑家諭又何疑焉師世壽六十有六坐四十一夏塔全身於華山千華社之龍山諡淨智律師塔曰光明金剛所著梵網直解十六觀經懺法盛行於世太原五臺山永明寺澄芳律師諱遠清新安人也清厭俗歸真遍參名宿遊歷講寺習賢首宗遂精通教觀從北來南至越邦時值金陵慧雲律師說戒於武林之靈隱寺慧律師忽於夜夢有人語云明日有文殊菩薩化身來乞戒律師方便為彼授之次日清率衆趨壇執弟子禮慧律師曰汝何所來清曰從北五臺來復問曰何往清答曰弟子向雖宏法尚未近圓久仰和尚道風今欲歸依之慧律師曰不日進戒汝來隨衆受之清辭退而去届日清微疾不至慧律師只說彼虛言復憶夢中之語方便攝授遂遣人探問清果有微恙是以慧律師不吝慈悲統衆就彼一時三壇方便授受清既得戒已如獲至寶即還五臺遂精研律部善達開遮清猶憶古有戒壇自明統已來戒壇封錮清欲興此舉何由得便幸值內宦與清契濶言及於此清尤善文章略書開建戒壇梗槩是以內宦奏疏帝闕帝覽本大悅斯乃萬歷年間奉旨南來詔慧雲律師敕兩街及內使御馬監太監張然等齎敕并衣錫杖大開皇壇說戒三年於五臺山敕建聖光永明禪寺仍賜紫衣金帛師資一時恩榮受渥然此舉昉自清師誠所謂法道一時師資讚揚以光法化世所稀有自古法門之盛莫過於此然雖如是必賴有力國王大臣方可興隆三寶非是靈山受囑秉乘大願而來不能如是耶是以慧律師意欲說戒三載時以鄰界戎馬遂即一期南歸命清律師續座宏戒於五臺以終三年之敕斯時戒法大興果符慧雲律師夢中之語清乃文殊菩薩化身乞戒無疑矣不然則不能恆住此山故華嚴經云肉身菩薩多住此清涼山中其清律師世壽法臘未詳滅度於太原之五臺山聖光永明寺後建塔於本山姑蘇報國寺茂林律師諱性祗族姓沈氏湖州長興人也母夢異僧托宿而孕甫能言專誦聖號性不茹葷志欲出家父母愛而不許稍長二親相繼去世祗年登十七因聞里中有彌陀古院遂慨然歎曰此即我歸依之地也盍往投之剃髮披緇已及冠歲矢志遍參名宿念思淨土兼修禪觀初從雲棲蓮大師學淨土法門次依天台聞谷老人習禪觀後近圓於金陵靈谷寺慧雲律師既受具已攻討律檢遍探羣書由是清標三聚諄誨五篇明季時開化四衆於吳越兩地學者莫不聞風趨座祗宏律三十餘年稟戒歸依者不可稱數又吳中士大夫羡祗戒德每請利濟幽孤其甘露瓶中不須注水而瓶水自溢斯乃道德之所致耳餘之密行可知矣祗東緣既盡急於西登世壽六十八僧臘四十八泥洹後建塔於吳門閶闔外之西園戒幢律院所著四分托略并五百問解盛行於世學者珍敬焉廣陵福田東滄律師諱性福族姓趙氏通江蜀人也師於本郡二峩山禮法空長老剃染為僧自為烟水南詢遍參知識遂受具足戒於金陵慧雲律師既獲戒體精嚴律行師平素間惟持穢跡金剛神咒一日慧律師夜靜經行但見殿宇光明閃爍近前視之唯聞咒聲不知是何人慧律師問曰持咒者誰福答曰某甲是也復問曰汝持何咒福曰穢跡金剛神咒是以次日慧律師命福至座前問其生平所行何事福曰向謁南海普陀山時住圓通殿三載一日散步林間有白鴉銜片紙擲地視之乃穢跡金剛神咒即翻藏考的一心受持日誦萬遍以為恆課慧律師曰汝自後號曰金剛大德因此行德彰名福每於壇內持咒之時其金剛杵自飛空中盂中水自沸金剛輪自轉待咒持畢其杵方墜水自渟金剛輪自綴其咒中之水和泥為丸凡有求之療病皆愈乃持咒之法力靈驗如此倐有神人代畫金剛杵蓬其壇畫竟是夜不見其形斯乃神人感化不可思議由是名布江左德揚宇內世人號曰金剛和尚師於萬歷年間傳戒於楚荊揚淮等郡凡緇素受化者莫計其數師初住本省長龍山曇華寺後徙廣陵福田律院其輪杆等肉身俱供福田院中世壽六十九僧臘四十一及至大清鼎新征討江南塔內放光見者疑為寶藏遂開塔視之端坐如生乃請出供於本院塔右過者敬信莫不義手禮拜焉三義蘊空罄律師受法姪覺緣之請於古林說戒一期仍交覺緣而退歸靜室香水大圓曇律師受淵源泉姪之請於古林主持戒法兩期而辭歸香水金陵古林庵隱微律師諱性理為祖應宗嗣紹繼慧燈宏律宏經二十餘稔於崇禎十年丁丑秋七月十六日示寂此下槩略寂洪統紀其世壽僧臘俱未詳載古祖下三世京都愍忠大會海律師法嗣太空滿律師愍忠二代有傳玉光壽律師廣濟一代有傳洞然耀律師中州龍潭金陵寶華山三昧光律師法嗣見月體律師寶華有傳無學幻律師永州荊紫有傳四宏願律師別峯支浮嶽律師杏嵓見空慧律師純然鎧律師獨行能律師五臺香雪潤律師天寧有傳一如真律師西林若相空律師霍山熏六燈律師願雲顯律師洪州幻住受律師煦杲照律師仰山友蒼庭律師金剛俞俞珠律師遍雲闔律師玉泉松影省律師太原五臺山聖光永明寺澄芳清律師法嗣一齊壽律師慈光有傳守愚宜律師湧泉金陵古林庵隱微理律師法嗣覺緣諄律師淵源泉律師印含璞律師古林有傳慧雲馨祖下三世律師傳京都愍忠寺太空律師諱性滿太原岢嵐州常氏子也生於萬歷壬午七月十五日依晉府官地遠泉寺慧暢和尚祝髮於萬歷四十二年四月八日圓具於五臺永明慧雲律師座下後為愍忠大會律師所器重遂心印焉其世壽僧臘未詳廣濟玉光律師諱寬壽山西太平人也生於萬歷庚寅五月四日依慈雲寺慧惺大師祝髮天啓二年於愍忠大會律師座下圓具為廣濟開法第一代焉其世壽僧臘未詳寶華山見月律師法諱讀體滇南白鹿郡許氏子始祖江南句容人也從洪武開滇黔以軍功封世襲遂家焉父酳昌母吳氏夢梵僧入室而生師生而神敏好遊覽善繪事所至山水佳處多墨妙尤工大士像人爭寶之父母早逝年二十七伯指揮使艱嗣欲以其官官之師介然不屑痛念生死慕赤松子故事去為黃冠三載因遇一老僧授以華嚴師披閲有悟尋捨去禮寶洪山亮如法師乞度先一日法師夢一人身著袈裟後隨大衆無數跪求剃髮明旦見師與夢符喜為再來人遂與剃染時三昧大和尚以當代律匠宏戒兩都繭足萬餘里始獲圓具於海潮其慧過人悟不由師未預僧倫便能為衆敷演大乘至納戒日昧師即命代座講梵網心地品詞如湧泉聞者驚歎旋命分座教誡後學道詣日高謙牧日卑遂乃廣翻律藏直究根源焚膏繼晷思維深義或文有隔閡者則禱佛求解由是毗尼一宗躬行精練共推為大法幢也師為黃冠時夢至一大寺金碧交輝比邱濟濟欲進而限以閾躍身以入顧其身為僧相一老僧朱衣高座笑顏招師而上授經命講衆皆跪聽汗流而覺至隨昧師宏戒金陵報恩寺登壇境界恍然前夢也師性剛正不阿遇事不如法者讜言無隱昧師嘗曰老人三十戒幢若非見月幾被摧折乙酉昧師歿以衣鉢付師師心喪三年慨法門秋晚正制久湮乃立規約十條與衆共守是制必遵非法必革凡授戒安居自恣等規模法範皆按律藏依制而作難行難忍之事率身先之一時見聞者咸謂南山再出法運當興四方學者翕然從風國初山寇竊發所在震動師杖錫開導遂解散之時有譖於大將軍前者謂華山匿賊怒甚率數百騎執師與大衆至軍前劒㦸林林師威儀整肅應答安詳一軍敬服山林遂安師以心為戒體躬修般舟三昧為衆標榜九十日晝夜壁立不坐不臥不旁倚如是者凡兩度焉師依制結界立壇已十六年慮水難𡹁久復建石壇層級欄楯重重莊嚴開基之夜感壇殿交光五色直冲霄漢衆山羣樓明白如晝莫不駭異讚歎華山當昧師時修建尚未完備師為庀材重興殿樓寮閣佛像供具色色堅緻雕琢丹堊之華鋪飾莊嚴之盛大江南北所僅見者又為創造慈應禪林重建天隆古剎壬子江南饑師導輸賑粥五十餘日凡活數萬人師每振錫出山四方風動遐邇緇素奔禮恐後至輿乘填衢香花塞巷莫不梯山航海供養致祝福報之盛從未有比師相殊特聲若洪鐘登堂說法林木為振暑必結衣寒必露頂素無疾病戊午歲除示微疾己未正月既望力疾集衆以衣鉢付定庵基主持法席屬纍後事畢云七日後行至二十二日午時誡衆以精勤行道語畢端坐而逝及茶毗日遠近四衆不期而集填溢山谷佛聲震天皆遙見光彩上騰蓮花佛相結篆烟際火滅獲舍利五色升餘師世壽七十有九僧臘四十有四坐夏三十有三傳戒七十餘期戒弟了數萬計所著大乘元義等若干卷行世至於馬陵之枯泉自溢龍泉之三世冤消冥界歸依神龍護法諸跡靈異種種未易殫述云又史官尤侗曰豫童子時嘗禮三昧和尚於北禪後聞華山嗣法有見月師恨未之識也老至西湖晤其高弟宜潔示豫一夢漫言乃循覽贊嘆而為之傳師諱讀體字見月雲南楚雄許氏子也少好遊覽嘗至金沙江甸尾山寓浪穹遷赤宕嵓矢志修真為黃冠三載一日偶行松下遇芧庵老僧與語甚契授以華嚴經持歸閲至世主妙嚴品翻然有省遂詣寶洪山亮如法師剃度已聞江南有三昧律師開戒慨然慕之一瓢一笠重繭而行時當明末流賊槃牙烽火相望饑荒遍地土寇肆劫所過崇罔危磴盤江險洑蠻雨瘴烟猿嘷虎嘯之區荒祠古墓深菁蔓草晝則風餐宵則露宿可謂艱難辛苦備嘗之矣師處之泰然直往不顧先入南嶽參傘居道人代演楞嚴四依解繼登破額山馮茂山上高山等寺禮諸祖道場進九華朝五臺再度大江始遇昧公於海潮庵計往返二萬餘里行腳六年矣既圓戒充上座講梵網經析義敷文四座稱善師猶欿然不自足乃於藏中檢四分并律藏讀之深思研究間遇壅滯禱佛求解默坐移時渙然氷釋由是毗尼大暢嘗從昧師傳戒金陵報恩寺座下千人師臨壇教授忽憶初為黃冠時夢至一大寺金碧交輝苾芻雲集門閾甚高躍身而入自顧已成僧相一瞿曇丹衣高座笑招師上授經命講衆皆跪𦗟汗流而覺及是所見恍然前夢焉距金陵七十里有寶華山為志公道場年遠頺廢郡人迎昧公主之師管院務庀材鳩工堂構一新至今巨剎甲於東南亡何以叢林多故遁跡黃山之貝葉庵俯視雲海若將終焉昧公屢書招之復歸於華方丈倚之如左右手師性剛直遇非意事輒正色折之即師友小過規諫無隱昧公嘗語人曰老人三十年戒幢若非見月幾被摧折臨歿取紫衣戒本付師曰以此囑汝總持三學師繼席以十事誓衆如不設私厨不立化主不攢卑不給疏不蓄香儀不避作務衆皆難之久而悅服又憫時習便安止作真教久成絶響於是結界立規率先躬行是制必遵非制必革尋復安居之法門人日進國初山寇竊發入寺蹂躪師誘致渠魁十人設齊供畢忽厲聲以大義責之且曉示利害大衆圍繞若將執之官者賊相顧失色逡巡遁去有譖於大將軍者謂華山通賊遣數百騎執師與衆僧至軍前劒㦸如林人人惴恐莫敢仰視師獨整威儀緩步歷階合掌而立具陳華山大路不能禁賊往來并前日食解散之故凡三問三答詞氣從容顏色不變巴廒二將軍陳中丞異之悉解衆僧之縛又欲殺監院孫內監房頭克修等三人師爭之曰我是寺主有罪當殺我勿纍及彼也將軍益異之并釋不殺還其田地給帖護持寺乃復安師既解難彌勒戒律與諸比丘日念佛號萬聲月拜淨土懺七晝夜躬修般舟三昧不坐不臥不旁倚壁立者九旬以其餘力重建殿閣築石戒壇別構慈應天隆隨處說戒如常州之天寧真州之五臺江寧碧峯紫竹林宿遷之極樂所至男女老幼闐咽道路戒子一千四百人堂食三萬指法席之盛近古以來未嘗有也師將謝世出一帙授弟子曰一夢漫言紀年譜甚詳已示微疾以後事囑定庵基曰勿進湯藥更七日行矣端坐而逝世壽七十有九僧臘四十有八荼毗得五色舍利塔焉所著大乘元義止持會集作持續釋黑白布薩傳戒正範及僧行軌則等書行於世論曰學佛而不學律欲其入而閉之門也今禪教二家塞破四天下而律道中衰古心草創三昧繼起至見月集大成而中興焉南山一宗於今為烈矣聞師修軀肉髻貌類古佛自滇雞足山來者云師是迦葉尊者化身固宜有此惜乎吾未見其微笑時也永州荊紫峰無學律師諱能幻新安人也幼習儒業知世諦榮華如幻達菩提妙果真常遂厭俗歸真削髮棄儒遍參講肆遊歷禪門由是精通教觀深契元旨次受滿戒於湖南之南嶽山大明律院雉潭三昧律師既隨僧倫綜習毗尼博通性相三學圓修二持罔昧是以律教並興化導四衆於楚湘之湖南斯乃明季時昧律師首傳燈之大弟子也化緣既畢遂歿於本郡荊紫峰其世壽僧臘未詳晉陵天寧寺香雪律師諱戒潤族姓陳氏楚地夷陵人也師家世圭璋心慕空門乃棄世榮剃髮披緇近圓於三昧律師稟具後遊歷講肆遍參名宿精通經律兼修淨土尤善文筆落紙成韻輔化千華昧和尚有年復卓錫於毗陵天寧律院四衆禮請登壇說戒時空中有戒日舒華祥雲五色覆其法座緇素咸瞻以為奇瑞時大清鼎新師道播江南受法毗尼弟子不可稱計化緣既畢建全身塔於本寺世壽五十七僧臘二十二所著楞嚴貫珠集行於世焉徽州黃山慈光寺大圓律師諱性壽字一齊楚之邵陽人得五臺澄芳清和尚鉢初開戒壇於蕪陰白衣庵時惠王聞師高德遣近侍魯公迎師至荊南率合宮執弟子禮求授優婆塞優婆夷戒未幾師辭歸入山王敬造衣鉢錫杖律部等件四十八單令送雲谷禪院建立道場四十九日大演毗尼僧俗皈投者日衆不踰歲允衆檀越請入