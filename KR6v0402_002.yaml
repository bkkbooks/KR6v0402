城倘能留心此事則吾願足矣言訖辭衆至十一月五日端坐而逝今琮公在寺由知客至監院置田若干頃皆為感師最後遺囑也十方緇素皆稱洞公律師為岫雲繼往開來之第一人師生於康熙丙午年九月十三日歿於雍正戊申年十一月初五日世壽六十有二坐夏三十有八奉全身塔於止公之塔左為潭柘中興之第四代焉潭柘岫雲寺本然律師諱明壽直隸順天杜氏子幼依普濟寺休如師祝髮康熙四十年四月八日圓具戒於潭柘止安和尚座下得戒後即依本山為引禮研究五篇七聚並諸律部悉為探討一時同學輩罕有及者後於德公和尚時請為首座進尊證位十有六年至洞公繼席又為教授為羯磨凡規式叢林模範後學無不克盡厥職時有和碩康親王來山避暑一見師深器之乃時至其寮房共談道妙嘗語人日本公實而不華真純品也嗣後洞公將以重任授之欲試其堅忍之力何如伺其以事出山故錯其日謂之過期於歸時撤其座鎖其寮大加屈辱師受之恬然洞公知其為入室真子乃以方丈事囑纍之師之居丈室也不立侍僧不使行童凡香爐茗碗洗滌瓶鉢之事皆躬自為之檀越慕其品高欲一往過其門不可得也其慎重出入如此一日無恙忽集衆曰我時至矣汝等當念光陰迅速人命無常趁此強健努力修行以求度脫毋致臨終懊悔莫及今將方丈事付育安闍黎大家念佛助我西歸遂合掌而逝師生於康熙庚戌年八月十五日子時寂於乾隆丙辰年三月十九日酉時世壽六十有七坐夏三十有五塔全身於錦屏山新房村南塔兒崖是為潭柘第五代律師焉潭柘岫雲寺育安律師諱源福直𨽾真定府新河縣王氏子幼依本邑地藏庵護生慈公祝髮康熙四十二年四月八日圓具戒於潭柘岫雲寺德彰和尚座下即依本山學律次為首堂引禮閲四期為西堂進尊證位未幾復請為監司凡內外大小雜務悉盡心布置大衆二時粥飯皆同典座如法調理至師所得經懺䞋資積至五兩即設齊供衆以是常住上下僧衆咸知師不昧因果云康熙六十年洞公和尚主席師鞠躬盡職亦與輔弼德公和尚無異雍正三年本寺教授乏人咸推舉師師以讓賢避之力辭朝海洞公知其志不可強乃聽其暫往權請沙河天水法師代之洞公不以本寺職事代者意蓋望於師也明年春師歸自南海有京都廣濟律院專啓到山請師為教授師辭再三不獲已應其請為客期教授仍居本山尊證越兩期天水法師去師補教授職雍正六年洞公示寂本公繼席進師為羯磨至乾隆元年本公將西歸集兩序以方丈事囑纍之師繼席後愈益謙謹與衆同甘苦每遇坡事必身先之見衆中有單薄者必多方周濟務令得所至於接待十方禪侶及本山弟子惟以本分修行者為重己未歲欽賜本朝龍藏一部辛酉春監院琮璋大師於京城內外募化大起龍華三會遍請五十三參緇素雲集法財雨施二時過堂常有千衆洵為曠劫希有之勝緣也夏五月龍華道場圓滿師以歷年常住勞瘁致染重疾纍月不痊凡有僧俗弟子問訊起居惟以身為苦本各自努力幸勿類我誡之至十月二日沐浴更衣跏趺端坐默然無語三日安詳而逝始知師之臥疾數月乃以病行示人也師生於康熙十八年己未四月二日示寂於乾隆六年辛酉十月五日世壽六十三僧臘三十九奉全身塔於本公塔之左是為潭柘第六代律師焉潭柘岫雲恆實律師諱源諒直隸河間東光縣侯氏子六歲依吳橋縣三元庵釣一師剃染康熙六十年十二月八日於潭柘岫雲寺德彰和尚座下圓具依本山學律至雍正元年癸卯德公命為引禮師範新學朝夕不怠六年戊申肢體疲倦舉動維艱至大慧寺住靜少愈即歷諸禪講以福不在彼所如多不契九年辛亥歸本籍因念病苦多緣宿業遂自設壇朝夕禮大悲懺默求𡹁護十三年乙卯身始健壯朝五臺禮覲文殊回京值潭柘啓建龍華大會師過之時本公主席留為引禮乾隆元年丙辰本公遷化育公繼席師由引禮升教授己未進羯磨辛酉冬育公示寂師主法席癸亥春裝潢欽賜龍藏工畢開閲藏道場恭請八大菩薩甲子春上幸本山臨視莊嚴整肅供品明潔天顏大悅賜供銀二百金九額二聯詩二章幅子一軸琺琅五供一堂乙丑秋又建無量壽會十五年庚午復於下院翊教寺建龍華大會請五十三參道場之勝與前無異二十年乙亥監院琮公感念老病無依者與人為善行化十方善信於山門外左畔建安樂延壽堂一所收養老病二十二年工竣建安樂延壽念佛開光大會勒碑刻銘𡹁示不朽二十五年庚辰朝南海以了夙願既歸遂不復出二十九年甲申皇上駕幸山中歡喜倍前賜護身佛一尊金剛經塔圖二軸供佛齊僧銀三百金御書四額皇太后賜琺琅鍍金供器二十五件此更難逢之盛事也師為人寬裕溫厚不矜不忌雖新戒弟子作務行人莫不愛之如親眷屬院中一切瑣事一任職事經理從不介意所謂海納山容者也師生於康熙三十七年十二月六日寂於乾隆三十年四月二十日世壽六十有八戒臘四十有五奉全身塔於蓮化峰祖塔之右是為潭柘第七代律師焉戒弟子善學拜述寶華山閔緣律師諱常松江南金壇陳氏子天性好靜厭繁囂喜幽僻幼年從孰師授學宛似成人孰師異之曰此子非塵俗常傭乃山林淨品宜培以淡素勿茹以醇濃父母聞之竊笑曰吾家世事耕農惟稼穡是務非有善蹟以相遺安得佳兒之美報今但因其性而導之勿逆其天之所賦而已及年弱冠懇請出塵父母慨然不相阻乃芒鞋竹杖直造九華甘露庵禮因實和尚剃度和尚以法眼鑒其機緣而指示之曰此去金陵當今華山見老人中興毗尼之寶所天下學佛弟子必由此以立德辦道汝宜速往毋久滯此心樹要高志帥要鋭直陟蓮花域求受具足戒從此真履實踐漸升木叉之堂優入尸羅之室庶幾不孤已志不負吾言師惟命是聽即登寶華遂具大戒惟知戒行可行不計其功程所在松老人乃心契之而反試之以鉗錘觀其恆德師則愈加立雪之誠更進刺股之礪於是頓升引禮之班遂掌維那之執一堂之內分別三根而調攝之上焉者喻之以純粹之旨令其深思而自得之中焉者導之以當然不易之途使其循序而漸進之下焉者曲𡹁方便委宛周旋引之漸入法門三根雖有差池及其成功一也未數年松老人謝世師奉未命守祖傳衣鉢然後禪以方丈焉五十二年春值萬壽聖節廣陵宦商諸公啓延師上京作大佛事恭祝天子萬年駕幸道場目擊耳聆良久乃日何儀範之淳雅音聲之和平乎師伏奏曰和平乃比丘之本分事也上喜而笑曰此華山之所以為華山也又問衆中可有能詩者麼師奏曰律門日以禮誦為事無暇留心於風雅上首肯曰律法之能範圍一世者蓋在是矣由此賜御饌每日無間佛事將竣賜紫衣並玉器數事然後奉旨還山永鎮千華為太平盛事又蒙兩浙督憲赫公并將軍鄂公仰體皇上隆重戒法之心盡將本山所置産業出示勒石以警後人以𡹁永久此皆師之宿植所致豈偶然哉師恆以得人為急以故擇銑於金選瑤於玉僅得珍輝一人於教授寮嗚椎集衆命主千華隨將祖遺衣鉢法物與方丈一併交付之乃囑曰佛法𡹁秋人心不古競高物我之山眇視六和之貴獅蟲可畏魚蠹何堪言及於斯可勝浩歎惟茲千華雖仰賴祖宗德厚流光豫自繼席以來凡十年朝乾夕惕惟恐常住有虧毗尼减色今歸期在邇聊以數言相警䇿爾等必行於斯坐於斯密行潛修自然為師為範此豫所不孤於大衆而大衆亦當告無愧於祖宗念茲在茲互相勉旃言訖沐浴更衣端坐而逝師生於康熙甲辰年十一月十七日示寂於康熙戊戌年八月初九日世壽五十有五僧臘二十有三坐夏二十有二師貌蒼古髮虯旋髯螺卷頂霽月繩己以嚴肅接人以和平勤於公事不泥私情雖未能追風於諸祖庶幾執法以守成喜得人之有慶善繼述其家聲儀徵隆覺冶牧律師諱洪建河南歸德府夏邑馮氏子孕師母不茹葷師生三日母夢師曰吾錯入汝家欲去母因急留而驚覺是日師果不乳且病母禱於大士前許送出家為僧師安然無恙後復疾遂於本鄉洪福寺拜慶庵和尚為師至七齡入寺剃染從師習學十餘稔歲登二十具三壇於白雲佛定和尚屢屢入室請問經律大義切韻指南晝夜無間威儀軌則毫無違犯定曰此子將來必為律虎未幾結伴南詢上華山學律於定律師座下五載律部精通祖亦深器之師又欲透禪關扣諸宗匠杭之理安紹之顯聖寧之祖印吳越知識次第參訪遇剃度師統衆朝海侍返故鄉自念白雲法雲華山三師恩德難忘不啻三登九上康熙戊子秋重上華山臘月四日松律祖以衣鉢源流授師與閔祖歲除松祖示寂筆囑閔祖主席師為羯磨師奉遺命盡心竭力輔弼三年有餘心喪既畢赴揚州山又王公之請為隆覺方丈入院後接納雲水訓導後學安居傅戒遵奉華山無異日徵學人本業夜究自己工夫三十餘年如一日以致遠近歸崇檀施恐後令數椽之隆覺而為祇園精舍矣又於壬戌間感維揚交如汪公施淨財三千餘金建戒壇於寺之左師悉依華山成式律中嚴制未嘗稍有差舛正當法運𡹁秋師能力挽頽風尊古人啓後人本戒行於行住坐臥會心地於持犯開遮感化於當時風偃於烟水於是海內皆知華山分座代有人矣金陵慈應寺璇璋律師名心觀別號雪堂何氏子乃浙之嘉善人也少從本郡大勝寺淵浹師剃染一日見華嚴經頓發宏誓誠心頂禮又玩淨行一品菩薩發願以戒為本由是褰裳遠涉孑焉孤邁於康熙丙寅歲受具於寶華山定庵和尚嗣與同志自姑蘇渡錢塘遊赤城參宗門瞿仙師瞿見師不凡默契心宗乃印囑焉師忽憶禪是佛心戒是佛行縱明佛心不行佛行亦屬何濟遂返金陵之寶華重學毗尼於開遮持犯深有所得是時眼公亦在寶華見師貞苦之操可任法席乃以袈裟囑之蓋師為眼公之嫡嗣定庵和尚之長孫也論者以師既受單傳之囑何為復受木叉之印師曰宗律一理本無異致何得岐而視之謂吾道有二門耶句曲緇素聞師之風請主胄山之寶山寺始至時殿宇荒凉墻垣傾圮師慨然誅鋤草萊掃除瓦礫辛勤畚築次第經營迄今稱勝境云秣陵張君又傾慕企仰延請主席報恩之三藏禪林師專以宏範毗尼兼修淨土為務以故法律精嚴接待四方之人極其周至遠近緇流無不合掌皈依嗣後眼公以慈應一席為寶華山重地非師莫勝其任命師主之師競兢業業二十餘年有如一日師為人廉潔氣宇寬厚宏濟甚多利賴甚衆示寂時以方丈命門人僧樹主持囑曰老僧衣鉢戒本付汝汝後慎勿濫傳當以法門為重汝其勉旃言訖而逝師於乾隆壬戌年六月十三日終世壽七十有六法臘五十有一贊曰緬哉佛性廓矣位功昭曠劫化拯迷昏冲威儀已謝法律斯存匪伊開士孰暢其言於顯法師誕靈杰起如松之秀如巖之峙穆穆風規堂堂容止降生嘉善早厭樊籠息肩慈應峻範彌融將超八難即悟三空貞固可仰願力獨洪卓錫幾處煥然一新寶華分蘂法鏡傳薪徐州皇藏峪瑞雲寺藥屋律師諱實懿其家也籍鳩茲族楊氏幼年好遊寺觀凡遇講肆逢高禪輒盤桓不忍去因朝九華便道至古南泉寺謁淳也和尚䇿發道心回家白父母允可次訪天然道人幸𡹁接引云有一甘泉禪師今寓卓錫庵吾與汝可訪之及相見禮佛次禪師云何不拜你自己的佛因此通身汗下每靜坐思維欲出塵勞必須出家遂投維揚廣緣庵甘泉和尚剃度師云出家人不可耽誤歲月當急念生死即遵慈命力參救生節巖老宗匠復上華山精研律部嗣後養靜於蕪邑泗水園蒙本師老人命主瑞雲法席一十四載嚴淨毗尼奈桑榆景迫任不逮願得門人大樗少荷半肩專宏律範將慰我千華分熖可藉斯子而光大焉生年七十六法臘三十九退隱於本山之休休堂以樂餘年乃歌偈曰空將幻影寄閻浮慚乏瑞雲十四秋從此萬緣俱放下休休休也復休休維揚石塔寺朗清律師諱通和蘭陵名家子九齡剃染於大林二十受具於寶華研幾戒典參究宗乘發明大事逮受撫生和尚記莂首衆持律一時龍象靡不奉為軌範未幾師繼撫翁席凡遺願未果者力任完之四衆雲臻戒香圓遍南山一宗寶華而下推維揚為最者二師之導力為多既師示疾門人環侍次師曰我繼先人席未果先人塔院事今時至矣爾其有為我為之者乎品公進曰為所當為弟子事也師無憂師曰即子是矣雍正十年冬十月十五日也僧臘三十有五坐夏二十有四嗣法八人奉骨於維揚城北建隆寺西撫翁塔院主穴之左書至此品公曰志則是矣敢乞銘余曰三藏十二分皆銘也余安得饒舌雍正十三年奉旨集三宗義學沙門校刊龍藏律宗預斯會者惟揚州石塔寺朗清律主高足弟子品木上人乾隆三年十二月工竣品公既竣事乃以其師行狀乞余銘塔曰此我所以報師恩也余曰惜子志之勤而問途於盲不得其所以報也然盲非眼則余亦可以言乎夫一銘之於大藏如太空一毛巨海一滴公所校者千佛之行狀師之塔銘已十分具足以此為銘則盲者不見見不見見則可以報師恩矣品公悚然曰請居士重提起余曰又是一重公案於是按狀節舉梗槩而序之如此經筵講官內閣學士兼禮部侍郎前刑部尚書總理苗疆大臣張照撰維揚寶勝寺自庵律師諱本泰廣陵人幼依本郡定慧庵壽山和尚剃染年二十乞戒於寶華松祖次參石塔撫祖一語契心遂付法焉會城東寶勝寺寺主熙敬師同紳士請師主席其寺始建於唐廢弛已久師不憚煩勞剪茅除穢葺缺搆新叢林規模輪奐在望至於春冬傳戒提挈毗尼憫孤利幽種種善事筆難殫述時有吳國博雲上公知師寡言樂靜於城南築蓮華精舍汪光祿上章公從而擴之為師恬退之所甚愜師意遂將寶勝傳其法嗣持五嶽而自退居蓮華專修淨土辛酉歲師年六十翰林南軒唐公為文以著之又有承書周公為師寫小照如隨山子題曰阿師好箇道狀貌古神奇別樣如意袈裟靜坐令人可瞻可望平生直心直行一身無拘無放本分處世隨緣頭陀事業自創有者誠哉讚歎有者妄言誹謗毀譽如山不動見師過人分量何妨旁通一線此間微露影相畢竟問著是誰律主自庵和尚呼此即師之實録也歟京都瑞應寺瑞林律師諱祥暉北直天津族孫氏其母將娠有異徵父私禱彌勒院即生長六歲隨祖母王氏詣彌勒院事懺償願師雖齠齔觸事通曉見佛輒生喜躍聞梵遽起指顧祖母回語父母曰此子信非塵勞中人必宿習再來僧也商計久之遂送里之無量院禮濟舟大師剃染教習經梵恍如記憶年二十辭師詣金陵寶華受具足戒於定庵和尚三載安居專精律部研究止持壬午春辭定公南下兼慕禪學過普陀天童之育王顯聖諸剎凡浙中有名宗匠無不參謁次應剃髮師病急特專人以書招師北還未幾師疾大痊是冬之蔡村謁允則和尚於興善禪寺次春即過柏林寺參獨超和尚痛領鉗錘重甘逼拶此中方得了悟居二載過潭柘確志禪律壬辰春值檀老人受瑞應請招師佐助師來京檀老人命掌監院事由是瑞應嘉聲復振大宏律學皆師輔翼之力居多檀老人遂以衣鉢授之良有以也越三載丙申將之五臺有摩尼寶積光輝滿定向無人覔處逢之句是秋又受大安禪師請傳戒於護衆律院期畢還京憩西山大悲禪寺揆公復以簡招師仍理監院事越五載辛丑值檀老人示寂囑師繼席不獲辭住持十年精勤為法律己飭躬梵衆肅然歲庚戌地震殿宇傾斜師竭鉢資整葺如新再構法雲金湯二宇緒置回龍田地建普同窣堵此皆瑞應有其所無者壬子夏五月二十五日辛巳示微疾集衆囑曰塵勞幻影實難把捉稍涉安排即成大錯隨緣隨分莫生節目爾等既為佛子謹持斯語精勤莫怠言訖趺坐而逝世壽五十有二僧臘二十有六嗣法門人了緣悅等奉全身塔於都城德勝門外古塔之右焉寶應觀音庵紋玉律師諱照慧歙之吳氏仲子也甫離襁褓過嗣蘇姓母莊氏七歲失怙便有出塵志至九齡父送青陽天柱庵依松友和尚剃染年十七往太平翠微精肄教觀載餘族擕歸省幾誘畢婚師乃潛去後從黃山雪大師書畫康熙癸未冬上寶華山得圓具戒於松隱律祖明年春業師手召還天都適里間有永安橋乃通郡要津坍塌已久載涉維艱咸乞師募重建僅及歲工竣尋詣兄任遂留都遍參知識既而聞瑞應律化之盛師往親炙踚年深研律典每於中夜課禮寒暑不輟檀老人益深器重即以衣偈囑之歲庚子回邗上遇安宜護法曾識師於京邸請主寶應之蓮池惜多寢弊卒莫能挽辭衆欲歸台宕邑中紳士堅請主東城外之觀音庵雖寥寥破屋數椽而義不可却師處之恬如也二十餘稔起敝支傾旋營旋葺稍稍以叢席聞於遠邇來學雲從檀施踵督肅傳戒矍鑠無老意兼解瑜伽世味清約居恆不越瑞應風規嚴寒沍凍雪頂蒼然則知千華派衍聲流無盡矣乾隆乙丑歲師年七十又七也宿遷極樂庵慧徹律師諱道福姓褚氏山左兖州濟寧人也年二十依淮之善因庵六門大師剃落圓具於極樂湛祖座下講習木義戒法俄而歸門門為開導師感奮一夕聞欵乃聲有省白門門可之門歿心喪畢一鉢一笻遍訪諸名山耆宿歲辛卯復回極樂桂老人深器印之即於是歲臘月八日命入方丈自是宏法傳戒萬指圍繞雍正戊申三月朔因患目疾先交全潮于常安即次將法席傳太初照嗣之師遂恬退頤養唯心淨土而已至乾隆辛酉八月二十一日自全潮晚歸示微疾次早命湯沐浴竟端坐不語門弟子請遺訓師曰更有甚麼值麗庵弟偕諸山問侯師一見微笑而逝世壽八十三僧臘五十二坐夏三十有九也戊辰冬法孫印可貴奉塔於五華山頂淮陰普應寺洞聞徹律師姓陳氏阜寧人也初母夢頭陀解囊珠而有孕師在襁褓口不納腥三五歲知佛堂禮拜凡見僧道問訊接談人皆驚異稱為再來人也年甫冠閲佛經四相皆空句翻然有省回視朱門不異蓬戶矣遂依道宏禪師剃度秉具於聞思宏範律主即依止學律苦行潛修不以一行自高不以一德自聳後輔友曇律師數十年心印嗣席廣行法化四衆欽崇歲甲寅七月六日示寂門人松堂壽建全身塔於開山祖塔之左世壽六十有三僧臘四十又四贊曰言炎非誇相空非頑普感應機杰出南山今其歸矣塔瘞靈龕天龍拱衛密布香曇旋聞德業典型存焉毗陵永寧寺不羣律師諱通一別號鶴鶴叟姓金氏浙之嘉善人靈躍律師之甥也年十三母抱病極篤奉慈命受五戒於靈公母疾立愈即發願皈依釋教年十四隨靈公至永寧寺先受十戒為驅烏沙彌年二十進受比丘具戒由書記歷任監院年二十六為教授四十一為羯磨丁卯歲嗣登法座時年五十一矣主席後春冬傳戒歷二十餘年如一日其心愈慈其法愈肅時有太史湯公大紳既歸田時與之遊爐煙茗汁相對忘言丙戌秋師年七十公乃為文以紀其實嘗考之高僧傳竹庵禪師渭公廣智全悟欣公之甥即法門嗣子也竹庵嗣法之日欣公語之曰能宏大定慧之道使不墜者其懷渭平今師之嗣靈公也其先後事蹟適相符殆所謂靈根夙植者歟下相劉霞彩撰真諦天慧律師諱通能鎮江金壇虞氏子也性本訥厭繁囂齠年失恃怙即依西禪寺脫白秉具於利咸和尚復以道脉傳之厥後常住變幻得檀護推師主席於是咸秉貽軌重光祖道宏闡毗尼十有六載嗣法者二十三人世壽五十二僧臘二十八降生於康熙戊辰九月二十二日入滅於乾隆己未五月二十六日也虞山興福寺智宏律師諱然理姓趙氏宋宗室籓守蓉城遂世居常州之江陰父子祥公母裘氏師行三幼而異有宿緣送本邑廣福寺依大乘老宿為度師年二十五秉寶華閔祖戒精勤學律擢職維那後至姑蘇人真諦利咸圓和尚室分主婁東海寧寺閲六載大施戒法化導彌多雍正元年冬應虞山興福請命嗣法至公繼海寧席擕一鉢至虞山維時興福堂殿圮坼廊廡傾穨榛草蔓延香烟斷絶師慨二千餘年古剎素稱為高僧之律窟豈宜衰替若此遂立誓願盡身心以報佛祖奈連值歲歉一粥難支兼前住者棄産負糧追呼無寧賴陶太史汪宮贊等鼎力護持虞山趙氏同出江陰系念宗𧨏亦皆竭力相濟始得稍安雲水二十年來穨者葺之傾者新之宏演毗尼戒雷益震甲子冬十一月二十三日届師六十法誕門人輩欲製錦為壽師力止之士大夫聞此益為敬重丙寅冬以院事命前住海寧之至善安公正方丈位師乃恬退於破山西院一爐一經以終餘年之樂云聞思寺聞慧律師諱常智淮安沐陽籍幼喜禮大士像既長披緇即投聞思寺秉具一日隨衆課誦至心經之無罣礙無罣礙故胸中凝結一時渙然因矢志渡江遍遊名剎參諸知識久之無所契謂同伴曰禪以戒行為基淨土為本吾何跋涉形骸而不務實事乎遂歸依本師專修淨業後監院事及就正主席宣揚戒法終始不懈凡人有過必循循開導其不遜者亦必委曲遣之終無慍色故學者多依依不忍捨去又嘗與同袍結社修懺預知時至告諸同社至日集衆付衣鉢後事畢命湯沐浴跏趺而逝後茶毗時有隱隱紫色如蓮花者然自龕前火光中湧出噫其或為師精誠之所結歟常樂緣鶴律師諱照宏族係仙源美溪李氏子其母夢一童子跨鶴飛入其家次日師即降生圓頂廣額眉目清奇見者即知為羅漢果位中人也長而拜常樂如心公為師遂取名曰緣鶴以符其夢兆之祥師於貝葉靈文過目即能了透豁如素習後得戒於寶華松祖心契波羅木叉之旨力任行持及遇韻松蓮公律師抉其素藏憮然曰超六塵通三昧者是子也乃付以紫衣戒本為律學真傳時諸檀越遂請主席本山演毗尼之正法三學勤修繼太原之高風七衆皈依若僧若俗得聞一句半偈者無不咸登道果者矣戊申歲以波離命脉傳之黃石開公乃端坐遷化人謂師乘願而來應化者信不爽也古祖下七世京都潭柘岫雲寺洞初林律師法嗣靜觀瑞律師潭柘八代有傳琮璋琳律師潭柘監院有傳京都潭柘岫雲寺恆實諒律師法嗣雲浦珠律師宿遷壽聖有傳徐州廣濟寺本緣顯律師法嗣大雅憘律師金陵寶華山閔緣松律師法嗣珍輝𤤯律師寶華有傳公照月律師報恩宗明徹律師石山遠慧徹律師極樂靜如能律師安福聞修立律師文基岐律師獨山律氷幢律師淨慈兼宗臨濟默融達律師豐安道明諒律師泊湄滿律師桂林珏律師真州隆覺寺冶牧建律師法嗣敷和悅律師隆覺有傳玉鏡輝律師文成銓律師聖壽自謙性律師廣義照律師地藏善超度律師惟一聞律師海潮自讀暉律師延慶天霞映律師宏慈永持恆律師三聖解餘濟律師東林建明所律師經山崇教正朴淳律師瑞光兼宗臨濟霞輝輪律師逢杲照律師覺然善律師天寧有傳根遠本律師文質彬律師西來瑞律師鐘樓問已住律師明已濟律師仁山定律師西印蘆律師性德濟律師靜怡巒律師繼能敬律師蘇州福生聚安光律師崑山淨土焦山別峰體勤禪律師法嗣元慧乘律師江寧三藏殿柏庵一律師法嗣我愚守律師善因朗律師揚州三聖瓜州總持庵開賢得律師法嗣覺證性律師總持可悅律師恭永律師道如墻律師蘇州福生宜陵慈雲寺福昌真律師法嗣恭維律師運修廣律師覺先果律師興化般若庵正元本律師法嗣蔭千檀律師般若慧圓俊律師自在天和利律師地藏昂旭蓮律師瑞安祥律師誠一成律師鏡智紫雲山戒光續律師法嗣松如塵律師紫雲松恆緣律師觀音旭初如律師準提覺