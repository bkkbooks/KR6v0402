有夙契相留者彌月師偶於山樓夜坐更深月落天氣昏黑忽見江心有火光星散照耀林木棲鳥皆驚曉公曰此木華海賦所謂陰火潛然者師聞之恍然如別有所得又數日辭去由毗陵挂帆平江訪生公說法臺於虎邱山下然後漸次餘杭過六橋遊西湖以尋濟顛祖師舊蹟凡石甑虎林栖霞以及飛來峯諸勝境其間禪堂講肆無不深為領略所可悵者鳥窠禪師立法之處惟有古木嶙峋鳳林破院而已嗣是歷東陽而南越蒿壩渡關嶺涉楢溪步石梁得寒山拾得二尊者所隱居巖穴並智者大師拜經臺故址遂悠然折方竹為杖陟天台最高頂以望赤城蒼洞天姥諸峯蓋徘徊不能去云侍者曰自此入天童阿育王寺有古舍利盍往謁之師如其言復攀崖捫蘿而至趍拜畢有白毫光從塔中隱隱射出師亦竊自異之厥後詣普陀禮觀音遺像則見海霧中亂嶂插天陰晴屢變隱現不常其山下波濤洶湧雷砰電激非慈航難以飛渡真所謂海岸孤絶可望而不可即者也庚申秋返於宿之極樂庵位居尊證閒閲龍藏兩易寒暑太初老人知其中有所得遂付以南山宗焉時有靈公師叔慧朗尊宿於城南修壽聖古剎壬午孟冬厥工既竣以年老靜居命師主席接待往來禪侶閲數歲重修大殿建左右二樓以廣其制而又念祖塔未謁終為缺然於焉過龍潭掃塔於華山即寶志禪師開山處也自是歸遂不復出師在院十有七年慎終如始未嘗稍懈至戊寅其年七十有一倦於院事乃專使赴京都潭柘岫雲寺召雲浦律師為繼席雲師者係師剃度弟子即岫雲七代恆實律師之法嗣也時有廣睿禪師與雲公同居勸以南下又有鹺憲高公相送入院迄今古寺聿興衆工畢舉屹樹戒幢遠接南北非師之付託得人何以至是當師之退處東林也板橋高懸石門深閉靜室之側雜植花木松蔭白塔竹匝清池雨霽煙消蒼翠欲滴師於此怡然自得謝絶人事凡歷十有二年惟終日掃地焚香默坐禪榻而已庚寅春忽示微疾於二月六日安然而逝世壽八十有三戒臘三十有七壬辰孟夏建全身塔於五華頂祖塔之側遂即師之年譜而為之傳師性莊嚴凡遇人不假辭色以是浮華者多自為遠去而質實者對之又未始不為之心契也至師衣鉢之傳則有下邳大德號慧先諱性文其人者睡庵劉霞彩撰宿遷極樂庵印可律師諱因貴姓韓氏山東滕縣人也寄居武城遂依五蟠寺獨步師剃染雍正辛亥圓具於極樂太初和尚座下即依止學律歷有數載辭師南下遍參宗教於江淮間復回極樂任首座職乾隆乙丑夏德明悟公示寂遵太初老人命不輕授受時有宗長麗庵錫公輝遠月公與兩序大衆擇七月朔日默禱伽藍齊集太初老人龕右焚香天選衆𨷺中拈得印可首座繼席即太初老人之戒弟子也師素行嚴謐以戒本為日課蓋時至理彰龍天推出於是復鳴椎集衆將祖遺衣鉢法物與方丈一併證明交付親承太初老人法乳為極樂第五代焉師嗣席後建慧公太公德公三世窣堵波於五華山院復備述極樂祖派并分化在法諸友入南山統以廣其傳不數載道風丕振傳戒者十有二期癸未十一月八日示微疾端坐而逝世壽五十三僧臘三十坐十八夏嗣法弟子坤傳微等建全身塔於全潮祖塔之左淮安聞思寺聚用律師諱眼文浙江金華蘭溪宋氏子也幼出家依本寺御章注公和尚座下得戒復付法焉當圓戒之初侍冶牧老和尚朝南海歷天台五臺諸大名山悉心參叩故師之行履愈苦愈堅後承注公命繼席十方納子爭投禮覲雖他處請師傳戒者甚夥而本寺戒期亦未有間歇且江淮間賢士大夫亦多追隨而師事之者蓋師接待緇素秪一味真誠絶無毫髮緣飾凡為人舉揚內典及古德公案惟依本分闡發從未少有附會一種坦平胸次隨處都成道氣此誠修持中所未易至者也今年逾六旬而精力不衰登壇說戒其聲甚洪四衆無不欽仰嗣法者凡八十餘人此可以想其風範矣淮陰三界菴碧淳律師諱照環江南鳳陽府宿州張氏子也幼依本州彌陀院廓智師祝髮乾隆八年圓具于柵淵極樂菴德明和尚座下繼參聞思聚用老人器重有年遂以心印付之由是續焰千華分燈三界自甘苦行不失聚公步趨無人我心有菩提志不數載梵宇聿新戒幢高樹海內景仰正未有艾也淮安觀音寺𣷉空律師諱源長別號性水山左郯城張氏子也幼投淮之安東縣地藏菴祝髮依師祖朗徹公誦經習禮雍正甲寅春恭逢世宗憲皇帝召文海聚律師於京都敕賜法源寺開壇授戒師圓具訖復回南參聞思聚用老人精持戒律無間寒暑聚公知為法門大器遂以衣偈付之乾隆乙丑歲聚公主席觀音歷三載命師繼席師甄陶後進無倦怠心復重建地藏大殿以廣其制歲丙子大飢師曾率衆過堂飲白水者三日而威儀整肅雍雍如初大衆益欣然樂附無一去者非師之德積於素何以至是嗣後道風丕振續置齊田以埀永久為後人所深賴焉戊寅歲師西逝世壽五十有一師頴慧善丹青受寫雪中寒梅踈枝冷淡古幹清奇殆於畫禪中而別得其三昧者歟古祖下九世金陵寶華山文海聚律師法嗣理筠言律師寶華有傳鑑如含律師雪浪慧善曜律師極樂澤周福律師極樂景蓮華律師天月實律師法源有傳淡園素律師法雲誠朴慈律師任城玉露德慧緣律師廣周全律師巨濤澍律師祖燈慧光晃律師德增賢律師智珠有傳如登從律師天隆自容源律師善倫英律師嵩山善律師福慧岸先道律師德賢證律師德滋泰律師天隆瑞符泰律師金陵觀音自如一律師靜安大律師毗盧一宏照律師參徹石律師蘭嶺馝律師炳一慧律師光孝佛燈明律師遍滋周律師惠周仁律師西池荷律師天都仰山永宜達律師泰州省徹淨律師普瑜璽律師如如悟律師浩聲潮律師如鑑慧律師震蒼靜律師開元性愷澄律師潤恆樹律師江蘇治平復聞廣律師慈雲省