body:
  text: 潭柘岫雲寺主律沙門源諒恒實重訂下相壽聖寺祥珠雲浦夢如散人善學廣膚仝較睡庵居士劉霞彩次訏編輯西天佛祖釋迦牟尼佛優波離尊者摩訶迦葉尊者阿難尊者商那和修尊者優波毱多尊者律宗燈譜卷一釋迦牟尼佛賢劫第四尊於此劫中人壽百歲時出現於世剎利王種姓瞿曇父字閱頭檀剎利王也母字摩阿摩耶王所治國名迦維羅衛佛子名羅睺羅侍者名阿難陀二大弟子一名舍利弗一名目犍連佛身長一丈六尺圓光一尋坐阿沛多羅樹下成道亦云畢鉢羅樹一會說法千二百五十人皆阿羅漢佛壽七十九歲十二年中眾皆無有瑕穢亦以一偈而為禁戒頌曰善護於口言自淨其志意身莫作諸惡此三業道淨能得如此行是大仙人道後為有漏因緣發起隨制二百五十戒法也如來大弟子中有五百大阿羅漢各稱第一而尊者優波離於持律中佛稱第一論云所以稱優波離持律第一者謂自從佛得戒以來未曾犯如毫釐故稱第一佛言乃為將來比丘能設禁法使知輕重得濟危厄汝真持律以律付汝勿令漏失不可示以沙彌白衣復稱第一也世尊及化緣周畢仍遺教云汝諸比丘於我滅後當尊重珍敬波羅提木义如闇遇明貧人得寶當知此戒則是汝等大師若我住世時無異此也普曜經云佛初生剎利王家放大智光明照十方世界地湧金蓮華自然捧雙足東西及南北各行於七步分手指天地作師子吼聲上下及四維無能尊我者即周昭王二十四年甲寅歲四月八日也至四十二年年十九欲求出家而自念言當復何遇即於四門遊觀見四等事心有悲喜而作思維此生老病死終可厭離於是夜子時有一天人名曰淨居於窗牖中义手白言出家時至可去矣太子聞已心生歡喜即踰城而去於檀特山中修道始於阿藍迦藍處三年學不用處定知非便捨復至鬱頭藍弗處三年學非非想定知非亦捨又至象頭山同諸外道日食麻麥經於六年故經云以無心意無受行而悉摧伏諸外道先歷試邪法示諸方便發諸異見令至菩提故普集經云菩薩於十二月八日明星出時成道號人天師時年三十矣即穆王三年癸未歲也既而於鹿野苑中為憍陳如等五人轉四諦法輪而證道果至二十一年辛丑佛始檢約徒眾剏制戒律說法四十九年後告弟子摩訶迦葉吾以清淨法眼涅槃妙心實相無相微妙正法將付於汝汝當護持并敕阿難副貳傳化無令斷絕而說偈曰法本法無法無法法亦法今付無法時法法何曾法爾時世尊說此偈已復告迦葉吾將金縷僧伽𥠖衣傳付於汝轉授補處至慈氏佛出世勿令朽壞迦葉聞偈頭靣禮足曰善哉善哉我當依敕恭順佛故爾時世尊至拘尸那城告諸大眾吾今背痛欲入涅槃即往熙連河側娑羅雙樹下右脇累足泊然宴寂復從棺起為母說法特示雙足化婆者并說無常偈曰諸行無常是生滅法生滅滅已寂滅為樂時諸弟子即以香薪競茶毘之燼後金棺如故爾時大眾即詣佛前以偈讚曰凡俗諸猛熾何能致火爇請尊三昧火闇維金色身爾時金棺從座而舉高七多羅樹往返空中化火三昧須臾灰生得舍利八斛四斗即穆王五十三年壬申歲二月十五日也世尊滅後千一十七載後漢永平十年戊辰歲其教始入中夏優波離尊者佛為太子時尊者為親近執事之臣也因翻云近執或云優波釐又云鄔波離此翻化生亦翻上首以其持律為眾紀綱故名優波離律云諸苾蒭白佛此鄔波離作何福業證阿羅漢持律第一佛言其鄔波離斯有因緣汝等善聽我今為說乃往過昔於賢劫中人壽二萬歲時有佛出世號曰迦葉波如來十號具足時佛有一弟子是阿羅漢持律為最鄔波離為彼弟子終身梵行不獲果利臨終之時而發誓願我所持福業善根願當來釋迦牟尼如來出現世時與彼世尊作持律弟子如我鄔波馱耶無異其弟子者即鄔波離是為先發願故今獲斯果尊者於圓通會上即從座起頂禮佛足而白佛言我親隨佛踰城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏承佛教誠如是乃至三千威儀八萬微細性業遮業悉皆清淨身心寂滅成阿羅漢我是如來眾中綱紀親印我心持戒修身眾推為上佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一西域記云王舍城迦蘭陀竹園西南行五六里南山之陰大竹林中有大石室是尊者摩訶迦葉波於此與諸大阿羅漢結集三藏前有故基未生怨王為集法藏諸大阿羅漢建此堂宇阿難聞持如來稱讚集素呾纜藏優波離持律明究眾所知識集毘奈耶藏迦葉波集阿毘達磨藏雨三月盡集佛三藏訖律云三藏者一毘尼藏二修多羅藏三阿毘曇藏取要言之律經論三藏也按餘諸部多云先集經藏今本律與五分皆言先集律藏如善見律云大德迦葉問諸長老曰為初說法藏毘尼藏耶諸比丘荅曰大德毘尼藏者是佛法壽毘尼藏住佛法亦住是故我等先出毘尼藏據此則先集律藏今以文便故譯者宣次在後又以三學言之律亦授在初也摩訶迦葉尊者摩竭陀國人姓婆羅門摩訶梵語此云大迦葉波云飲光名也父飲澤母香志師生而金色因昔為鍛金師善明金性過去有佛名毘婆尸入滅起墖塔中像壞時有貧女將金珠往金師所換金餙像因捨之二人發願為無姻夫婦由是因緣感九十一劫身皆金色久在天上後生摩竭陀國身色金明故號為飲光見佛志求出家佛言善來比丘鬚髮自除袈裟着體常於眾中稱歎第一習頭陀行是稱金色頭陀西域記云迦葉波者聲聞弟子也得六神通具八解脫如來化緣斯畢𡹁將涅槃告迦葉波曰我於曠劫勤修苦行為眾生求無上法昔所願期今已果滿我今將欲入大涅槃以諸法藏囑累於汝住持宣布勿有失墜姨母所獻金縷袈裟慈氏成佛留以傳付我遺法中諸修行者苾蒭苾蒭尼鄔波索迦鄔波斯迦皆先濟度令離流轉迦葉承旨三番結集住持正法涅槃經云爾時迦葉告諸比丘佛已茶毘金剛舍利非我等事我等宜當結集法眼無令斷絕於是如來弟子得神通者悉集王舍耆闍崛山賓鉢羅窟後阿難比丘亦證阿羅漢果多聞總持有大智慧梵行清淨佛所讚歎聰敏第一夙生世世從事諸佛受持法藏故今從佛出家為侍者佛所說一字不遺故佛滅後結集法藏皆從口宣迦葉問諸大眾阿難所言不錯謬乎皆曰不異世尊所說迦葉乃告阿難我今年不久住今將正法眼藏付囑於汝汝善護持聽我偈言法法本來法無法無非法何於一法中有法有不法說偈已迦葉乃持僧伽黎入雞足山入定侯慈氏下生是為禪宗初祖阿難尊者王舍城人姓剎利帝父斛飯王實佛之從弟也梵語阿難陀此云慶喜亦云歡喜如來成道夜生因之為名多聞博達智慧無礙世尊以為總持第一加以夙世有大功德受持法藏如水傳器無有遺餘佛故命為侍者及欲趣滅度乃以法付其弟子一名商那和修二名末田底迦而說偈曰本來付有法付了言無法各各須自悟悟了無無法傳法眼藏竟入風奮迅三昧商那和修尊者摩突羅國人也姓毘舍多父林勝母憍奢在胎六年而生梵語商諾迦此云自然服即西域九節秀草名也若聖人降生則此草生於潔淨之地尊者生時瑞草斯應出家為阿難之徒預受佛記居優留茶伽藍先伏其地二火龍然後領眾處之將入涅槃以法付弟子優波毱多偈曰非法亦非心無心亦無法說是心法時是法非心法說偈已即隱於罽賓國南象白山中優波毱多尊者亦名優波崛多又名鄔波毱多此翻近護吒利國人也姓首陀父善意年十七出家二十證果受商祖心印隨方行化至摩突羅國得度者甚眾由是魔宮震動波旬愁怖遂竭其魔力以害正法尊者即入三昧觀其所由波旬復伺便密持瓔絡縻之於頸及尊者出定乃取人狗蛇三屍化為華鬘輭言慰論波旬曰汝與我瓔絡甚是珍妙吾有華鬘以相酬奉波旬大喜引頸受之即變為三種臭屍蟲蛆壞爛波旬厭惡大生憂惱盡已神力不能移動乃升六欲天告諸天主又詣梵王求其解免彼各告言十力弟子所作神變我輩凡陋何能去之波旬曰然則奈何梵王曰汝可歸心尊者即能除斷乃為說偈令其囘向曰若因地倒還因地起離地求起終無其理波旬受教已即下天宮禮尊者足哀露懺悔尊者告曰汝今自去於如來正法更不作嬈害否波旬曰我誓囘向佛道永斷不善尊者曰若然者汝可口自唱言皈依三寶魔王合掌三唱華鬘悉除乃歡喜踊躍作禮尊者而說偈曰稽首三昧尊十力聖弟子我今願囘向勿令有劣弱尊者在世化導證果最多佛昔記云我涅槃後優波毱多無相佛大作佛事我後教化弟子此最第一於是隨方行化每度一人以一籌置於石室其室高二十餘尺廣三十餘尺四寸細籌所記人數充滿其中最後有一長者子名曰眾香來禮尊者志求出家尊者曰汝身出家心出家荅曰我來出家非為身心尊者曰不為身心復誰出家荅曰夫出家者無我我故無我我故即心不生滅心不生滅即是常道諸佛亦常心無形相其體亦然尊者曰汝當大悟心自通達宜依佛法僧紹隆聖種即為剃髮授具足戒仍告之曰汝父嘗夢金日而生汝可名提多迦乃以法付之偈曰心自本來心本心非有法有法有本心非心非本法而為禪宗五祖毱多尊者時有五弟子各宗一見分如來一大律藏為五部焉一曇無德法名四分二薩婆多三迦葉遺四彌沙塞五婆蹉富羅然斯部類雖殊佛親預記是故五天諸國隨宗一律皆獲道果尊者傳正法已乃踊身虛空呈十八變却復本座跏趺而逝弟子以室內籌用焚其軀收舍利建墖供養律宗燈譜卷一東土律祖曇無德尊者曇摩迦羅尊者北臺法聰律師雲中道覆律師大覺寺惠光律師高齊道雲律師河北道洪律師京師宏福寺智首律師南山澄照律師京師崇聖寺文綱律師崇福滿意律師長安大亮律師會稽開元曇一律師蘇州開元寺辯秀律師京師章信寺道澄律師東京相國澄楚律師昭慶允堪律師錢塘靈芝寺元照律師京城大普慶寺實相圓明光教律師燕都西山戒臺寺萬壽律師金陵天隆寺古心律師律宗燈譜卷一曇無德尊者天竺國人也此云法正或云曇摩毱多此翻法鏡又翻法藏亦云法密尊者采菽氏之裔體毘履之支通達理味含藏正法大集經云我涅槃後我諸弟子受持十二部經書寫誦讀顛倒宣說故隱覆法藏言隱覆者即密義也法名四分乃毱多祖之弟子述義云葢佛滅度後百年之中西土傳法者皆具禪法律三藏因尊者鄔波毱多弟子五人各宗其見開張毘尼分為五部宗者殊難自後傳法惟授禪宗及與經論也從是以後律燈漸晦慧命懸𮈔至盛唐宣祖撰行事鈔建南山宗遙依四分宗主為始祖曇摩迦羅尊者此云法時乃中天竺沙門善誦諸部毘尼秉承四分妙善律宗齊尚統傳云漢明初感摩騰法蘭惟有二人初來至此不得受具但與道俗剃除鬚髮被服縵條惟受五戒十戒而已伏惟如來出世八年始興羯磨震旦在白木調東二萬七千餘里開持律五人得受大戒自後至漢桓帝一百餘年內猶三歸五戒十戒迭相傳授桓帝已後北天竺國有五梵僧支法領等來至漢地始於長安與人受具足戒其時大律未傳支法領口誦出戒本一卷羯磨一卷流行此土今時名舊羯磨是後至曹魏嘉平二年曇摩迦羅尊者至洛陽又譯出戒律而以戒心為日用立羯磨受法準用十僧於是佛制大行震旦為中夏授受戒律之始也至姚秦義學及耶舍佛念譯四分十誦自此律儀大備法聰律師南陽人也元魏時世稱律匠稽傳載元魏以前諸受戒者用四分羯磨納戒及乎行事則依諸律為步趨何異乎執左氏經本專循公羊之傳文也至魏孝文世師於北臺山始手披口釋覆公隨聽抄記遂成義疏權輿師本學僧祗因受體則首傳四分遠承法時三藏釋雲中道覆者聰師之弟子也後秦有耶舍梵僧於逍遙園傳誦四分共羅什法師翻譯至元魏北臺始為演說師親承授最初於聰師講下纂成疏科六卷以釋四分大覺寺釋惠光姓楊氏定州長盧人也年十三隨父入洛四月八日往佛陀禪師所從受三歸陀異其眼光外射如𦦨深惟必有奇操也苦邀留之且令誦經光執卷覽文曾若昔習旁通博義窮諸幽理兼以劇談譎詭態出新奇變動物情時談逸口至於夏末遂度而出家所習經誥便為人說辭既清靡理亦高華時人號之聖沙彌也然其雅量宏方不拘小節讚毀得失聲色不渝眾益器之而美其遠度陀曰此沙彌非常人也若受大戒宜先聽律律是慧基非智不奉若初依經論必輕戒網邪見滅法障道之源由是因循多授律檢先是四分宣通未廣有道覆律師創開此部製疏六卷但是科文至於提舉宏宗無聞於世故光之所學惟據口傳及年登冠肇學行畧周常聞言不通華登戒便阻乃往本鄉進受具足博聽律部隨文奉行四夏將登講僧祗律初以唱高和寡詞理精玄漸染津流未遂聽徒雲合光知學功之所致也高齊道雲律師早依師稟奉光遺令專宏律部造疏九卷為眾所先成匠極多流衍彌遠加以威容嚴肅動止有儀談吐慈和言行相檢後又有道暉者連衡雲席情智傲岸不守方隅畧雲所製以為七卷聞以意會犍度推焉故諺云雲公頭暉公尾洪理中間著所以是也光諸從學翹楚如林眾所推仰者十人師其一也河北道洪律師從習羣經惟以律學名師據相州紹道雲𦙌容止沉正宣解有儀學門七百亟程宏量故諸經論之士將欲導世者皆停洪講席觀其風畧採為軌躅所著律鈔時共同秘而成授於世焉京師宏福寺釋智首姓皇甫氏其源即安定伭宴先生之後也首年二十二方稟大戒雖從師授而得否未知乃於古佛墖前請祈顯證蒙降佛摩頂身心安泰方知感戒有實自爾旦夕諮訪挺出恒標雖教所未聞而行儀先備及尋律部多會其文明若夙知首素奉僧祗後從洪學撰疏二十卷夫持律之賓日填堂宇南山澄照律師諱道宣京兆人姓錢氏吏部尚書申之子母夢月輪貫懷而孕生時母夢梵僧語之曰所孕者梁僧祐律師也處胎彌十二月而生九歲徧覽羣書十二善習文墨十五師日嚴頵公十六誦法華兩旬而徹十七落髮二十依首師進具戒三衣惟布常坐一食唐武德四年再依首師學律性好禪那期修正定頵曰戒淨定明慧方有據始聽未閒持犯焉識七年徙居終南紵麻蘭若宗承首法始製行事鈔建南山宗正觀四年行般舟三昧於清宮精舍經九十日龍化人形禮覲聽法沙彌染心顧盼其女龍怒欲害之念師教誡頓息惡心攝毒吐井白師勿飲此水及往視之其井涌沸又於雲際寺行此三昧前後二十一會常感天童為之給侍行道心勞疾作忽毘沙門天王授以補心之方即今之補心丹也師以戒壇未能合律躬自負土準律新之師行道中夜臨砌蹶仆有少年介冑擁衛之師問汝為誰神曰弟子博义天王子張瓊也以師戒德故給侍耳師問以世尊在世及滅度之事瓊一一言之計三千八百事隨問隨錄為感通神傳又以所寶佛牙授之宣保錄供養十九年偕奘公翻經宏福筆受潤文推為上首永徽元年復居紵麻乾封二年春天人告師曰師報緣將盡當生彌勒內宮十月三十日眾見空中旛花交列異香天樂同聲請師歸彌勒上聞之詔天下寺院圖形奉祀穆宗製讚曰代有覺人為如來使龍鬼歸降天人奉侍聲飛五天辭驚萬里金烏西沉佛日東舉稽首歸依肇律宗主懿宗朝諡澄照律師師之春秋七十二僧臘五十二德號法辯大師塔名淨光由其始終隱居終南故世人皆稱南山聖師也宣從登戒壇及當泥洹間受法傳弟子可千百人其親度曰大慈律師授法者文綱等其天人付授佛牙密令文綱掌護又傳云宣律師嘗築一壇俄有長眉僧談道知者其實賓頭盧也復有梵僧禮壇讚曰自佛滅後像法住世興發毘尼惟師一人也宣之持律聲振竺乾宣之編修美流天下是故無畏三藏到東夏朝謁帝問自遠而來得無勞乎欲於何休息三藏奏曰在天竺時聞西明寺宣律師秉持第一願往依止焉敕允之師撰有內典錄感通錄釋迦譜四分羯磨戒本律疏續高僧傳廣宏明集等書八十一卷並行於世是為南山律宗第九祖匡廬憨山師讚曰如來設教三學為師定慧所發以戒為基大法東流此教未光南山杰出一振其綱京師崇聖寺文綱律師姓孔氏會稽人也綱誕育之日白鶴翔集若臨視焉在襁褓中午後不受乳哺猶如堅持齋者童齔隨師訪道十二出家冠年受具精慮苦行專念息心藜羹糗糧麻衣草薦操有彜檢口無溢言尋詣京兆沙門道成律師稟毘尼藏二十五講律三十登壇中宗孝和皇帝延入內道塲行道送真身舍利往無憂王寺入塔其年於乾陵宮為內尼受戒復於宮中坐夏為三聖內尼講四分律一遍中宗嘉尚為度弟子賜什物綵帛三十匹因奏道塲靈感之事六月七日御札題榜為靈感寺焉開元十五年八月十五日怡然長往時春秋九十有二其年九月四日墖於寺側師於律門乃法宇棟梁智河舟楫並稱為南山祖云崇福滿意律師風神峭拔識量寬和經論旁通專於律學師初從文公法席已臻壼奧武德末遇鄴都法礪律師作疏解曇無德律部遂摳衣往從復明授受如是講導三十餘年乃傳付大亮律師亮方授越州曇一盛化之間出龍象之資無過意之門矣長安大亮律師幼而明敏學通經肄後詣上京探律範依崇得升意公堂奧由是道尊戒潔聲振京華後居觀音寺大為唱導紀綱人天師表至開元五年印可毘尼藏於曇一上首宏播戒宗前後講四分律三十五遍刪補鈔二十餘帙師資表率何莫由斯會稽開元曇一律師姓張氏葢韓人也曾祖隋太常恒始家於越梁肅製其碑銘曰越水漫漫崇山回合大師化滅式建靈墖緬慕上士誕修淨法有威有儀不窪不雜德溥化洽雲從海納勒石𡹁後千萬億劫遷化時大歷六年十一月十七日也蘇州開元寺律師辯秀姓劉氏漢楚王交三十一代孫也秀幼孤諸父哀字之禮如教立孝自天生而宿植緣深心田欲稔因請於伯氏欲出家其伯哀而捨旃事靈隱某禪師便能問津圖入道之意所聞指訓如涼風入懷醒然清悟天寶四年受戒於東海鑒真大師傳律於會稽曇一至德中舉高行隸名於吳郡開元寺乾元中下詔天下二十五寺各定大德七人長講戒律秀應其數也京師章信道澄律師姓梁氏京兆人也生而奇表輒惡葷餚出家如歸無所顧戀忽遇禪僧摩頂與立名曰道澄錫常隨冥合律範號律沙彌也受具之後聽南山律於諸學處徵其玷缺然賦性率畧住寺不恒或奉恩莊嚴草堂等寺所到便居護生為切建中二年坐夏於雲陽山有虎哮吼入其門澄徐語之其虎搖尾襵耳而退徙居章信寺或問其故澄曰出家者可滯一方乎西域三時分房俾無貪着觀門易立也東京相國澄楚律師俗姓宗氏母妊楚之時畏聞羶臊及誕光爛充室鄰落咸驚洎當七歲親黨携之入寺見佛像輙作禮歸家問父曰惟佛獨爾餘者如何父曰蠢動皆佛何况人乎楚曰兒願學佛報二親劬勞其父默而許旃至十歲於相國寺禮智明為師有童子聚戲而招誘之楚曰汝何愚騃好嬉戲耶且雪山善財亦童子還如是否旁有聞者奇之曰子異日成法門偉器必矣受具後習新章律師即能入毘奈耶窟穴然其擊難酬荅露牙伸爪時號律虎王公大人請益者日眾晉高祖聞而欽仰召入內道塲賜紫袈裟尋署大師號真法焉自此皇宮妃主有求出家者楚師落髮度戒表裏氷霜命為新章律宗主始末臨壇度僧尼八千餘人昭慶允堪律師錢塘人也幼從天台崇教慧公祝髮學無不通專精律部續南山宗感韋天示現地湧戒壇於杭之昭慶寺自慶歷皇祐以來復依律建壇於蘇於秀之開元精嚴等剎宏戒度僧祝延聖壽晚居西湖菩提寺撰會正記釋南山之鈔後有元照律師繼其寺仁宗嘉祐六年十一月二十六日入寂於昭慶建墖於菩提諡號真悟大師錢塘靈芝寺律師元照字湛然餘杭唐氏子少依祥符東藏惠鑑師學毘尼及見神悟謙公講天台教觀博究羣宗以律為本又從廣慈授菩薩戒戒光發現頓漸律儀罔不兼備後嗣法堪師南山一宗蔚然大振矣常披布伽黎杖錫持𥁊乞食於市又傳云靈芝律師重造明州五臺戒壇成有一老人神氣超邁眉鬚皓白進而啟曰弟子有三珠奉獻以為壇成之賀言訖忽然不見因置其珠於壇心屢現光相其後有壇主會十師大開戒法越二日夜分有一僧登壇忽覩珠光外徹內現善財童子僧乃驚呼眾起視之悉皆環禮自是每夜益伸虔懇而珠之所現或金色佛或六臂觀音或紫竹碧柳竒木怪石或迦陵頻伽飛舞左右或月葢或神龍獻珠神變非一見者聞者皆謂希有師主靈芝三十年眾至五百每日生宏律範死歸安養平生所得惟二法門政和六年丙申九月一日集眾諷行願品趺坐而化葬寺之西北諡大智律師墖曰戒光嘗謂徒曰化當世無如講說𡹁將來莫若著書乃述資持記濟緣記行宗記住法記報恩記觀無量壽佛經彌陀經二義疏定尼戒本凡百餘卷行於世京城大普慶寺實相圓明光教律師諱法聞姓嚴氏陝西人以西安王命居城南之義善寺邠岐涇渭四序講筵不絕從學者葢千數焉天子聞之徵至闕庭詔居太原教寺賜遼世金書戒本求戒者皆從公而師受焉王公大臣皆仰止高風猶景星鳳皇之瑞於明時也燕都西山戒臺寺萬壽律師諱道孚字知幻江南江浦蔣氏子於金陵靈谷寺薙髮受具後發足叅方誓曰此行不踏曹溪路永不回頭見故鄉後果如其語北遊時正統年睿宗崇重三寶奉詔賜紫勅建戒臺每歲於四月一日起至初十日大開戒壇說戒睿帝大悅曰僧眾甚多龍蛇難辨勅建淨染二門於此山以騐涇渭其篤信者則受淨戒不篤信者則觸染法但眾生愚迷偏着染法者多師奏毀之自是師頂𩕳凸出御稱鳳頭祖師師自改曰亦鵝頭耳故俗呼鵝頭祖師曾詔師大內奏對佛法帝以凡情試師不動聲色帝聞戒德操守愈加敬重賜號為萬壽祖師焉春秋八十五法臘五十五示寂後建墖於本山金陵天隆寺律師法諱如馨字古心族姓楊氏江寧之溧水人也馨師居家時篤信三寶年四十有厭俗出塵之志即於本省攝山棲霞寺禮素庵法師薙染為僧時素師講演法華至寶墖見空中現寶墖一座緇素仰瞻共稱希有以為應師之奇瑞也素師有高弟十人一時皆稱法門龍象而馨師居第七焉依本師受沙彌戒復欲近圓本師曰若得清淨十僧方可得戒如不滿數及不清淨難以授受是以叩諸宗匠輙究戒緣因閱華嚴經至菩薩住處品知文殊大士常住清涼師即矢志步禮五臺誓求見文殊授戒隨炷香鳴佛辭諸法侶躬行禮拜三遭寒暑方眺寶峰如是漸至於彼晝夜殷勤懇求至切一日景值餘暉客途閴寂忽見一婆子形枯髮白冠敝衣鶉手捧僧伽黎自林而出適前問曰汝求何事馨曰欲求文殊菩薩親授大戒婆曰持衣來否曰未婆曰此衣與汝師手接衣婆去將數武頃復標指曰大德那不是文殊麼馨一回顧隨不見婆子菩薩即於雲中𡹁手摩師頂曰古心比丘文殊為汝授戒竟師於言下頓悟五篇三聚心地法門視大小乘律恍自胸中流出心甚歡喜無可為喻由是馨師得戒於文殊菩薩也自此從北還南中興戒法專持梵律皎若氷霜至萬歷間金陵幽棲寺洪恩法師字雪琅奉旨督修金陵長干瑠璃寶塔諸務嚴整惟墖尖艱舉蜀僧巨川求師覔匠倍工益力猶莫之能大師深以為慮惟日夜翹勤冀佛慈應一夕夢感神諭云優波離尊者預斯始克如願既明馨果露頂跣足杖錫持鉢偏袒而入大師一見乃悟夙緣即召眾摳迎傾誠請助馨師攝眾禮佛遶墖已畢就前手附其頂即昇翔翔然若鳥奔巢無難輳合時海會見聞莫不忻躍大師遂偕諸檀信案香致謝乃以夢中警示對眾宣明一眾始知古和尚即優波離尊者再來而諸護法紳衿與名藍尊宿遂請開戒振古香林次靈谷棲霞甘露靈隱天寧等處法會雲興誠所謂戒月高懸法雷遠震於是廷臣野叟罔不知有戒也自元末明興以來律學荒蕪自此南山之道得復振矣神宗帝嚮師名稱延至五臺賜紫衣開皇壇說戒陞座之次五色瑞雲結葢盤空亭午方散上聞錫額萬壽戒壇勅繪壇儀賜號慧雲律師由是南北緇素登壇稟戒歸依者不可勝計并賜千佛珠衣鉢盂錫杖等件隆眷甚渥三壇已畢表請歸林敦留不已乃以法服建墖山陽以誌聖蹟用𡹁不朽師既知涅槃時至召眾於方丈囑累上首臻寂於萬歷四十三年乙卯十一月十四日也世壽七十有五法臘二十又七染道三十四年宏戒二十五載坐南北道塲三十餘會弟子數萬人多以不得一瞻禮為終身憾者得法弟子有光理諸公建全身墖於天隆之玉環山上聞遷化復遺詔愍忠請祖像於大內供奉御筆題贊永𡹁瞻仰贊曰瞻其貌知其人入三昧絕六塵昔波離今古心葢宋代元末律宗戒學相繼不恒其白四進具三聚妙圓乃肇行於祖是以明季及我大清聖世鼎新以來海內宏紹之英凡服田衣而知戒者莫不尊親為中興律祖云
